<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAYROVEX V17.1 | ULTIMATE SNIPER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #030303; --panel: #0d1117; --neon: #00f2ff; --sniper: #00ff95; --hot: #ff4d4d; --text: #848e9c; }
        body { margin:0; font-family:'Tajawal',sans-serif; background:var(--bg); color:white; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

        /* Status Bar V17.1 */
        .status-nav { height:50px; background:#000; border-bottom:1px solid #1a1a1a; display:flex; align-items:center; padding:0 20px; justify-content:space-between; }
        .system-led { display:flex; align-items:center; gap:8px; font-family:'Orbitron'; font-size:10px; color:var(--sniper); }
        .led { width:8px; height:8px; background:var(--sniper); border-radius:50%; box-shadow:0 0 10px var(--sniper); animation:blink 1.5s infinite; }
        .auto-btn { background:transparent; border:1px solid var(--neon); color:var(--neon); padding:5px 15px; border-radius:4px; font-family:'Orbitron'; font-size:10px; cursor:pointer; transition:0.3s; }
        .auto-btn:hover { background:var(--neon); color:#000; }

        /* Main Container */
        .app-grid { display:grid; grid-template-columns:300px 1fr 300px; flex:1; overflow:hidden; }
        .panel { background:var(--bg); border-right:1px solid #111; display:flex; flex-direction:column; gap:15px; padding:15px; }

        /* Heatmap Widget */
        .heatmap-box { background:var(--panel); border:1px solid #222; padding:10px; border-radius:8px; }
        .heat-item { display:flex; justify-content:space-between; font-size:11px; font-family:'Orbitron'; margin-bottom:5px; }

        /* Pattern Units */
        .unit { background:var(--panel); border:1px solid #222; border-radius:6px; padding:12px; cursor:pointer; transition:0.3s; }
        .unit.active { border-color:var(--neon); box-shadow:0 0 10px rgba(0,242,255,0.1); }
        .prog-bg { height:3px; background:#000; border-radius:2px; margin:8px 0; overflow:hidden; }
        .prog-bar { height:100%; width:0%; background:var(--neon); transition:0.3s; }

        /* Radar Signals */
        .radar-box { flex:1; overflow-y:auto; }
        .sig-card { background:var(--panel); border-right:4px solid var(--neon); padding:10px; border-radius:4px; margin-bottom:8px; cursor:pointer; animation:slideIn 0.3s ease; }
        .sig-card.sniper { border-right-color:var(--sniper); background:rgba(0, 255, 149, 0.05); }

        @keyframes blink { 0%,100% {opacity:1;} 50% {opacity:0.3;} }
        @keyframes slideIn { from{transform:translateX(20px); opacity:0;} to{transform:translateX(0); opacity:1;} }
    </style>
</head>
<body>

<div class="status-nav">
    <div class="system-led"><div class="led"></div> NAYROVEX AI CORE ACTIVE</div>
    <div style="font-family:'Orbitron'; font-weight:900; letter-spacing:2px; color:var(--neon)">V17.1 ULTIMATE</div>
    <button class="auto-btn" onclick="autoScanAll()">AUTO-SCAN ALL UNITS</button>
</div>

<div class="app-grid">
    <div class="panel">
        <div class="heatmap-box">
            <h5 style="margin:0 0 10px 0; font-family:'Orbitron'; font-size:10px; color:var(--text)">TOP GAINERS (24H)</h5>
            <div id="heat-list">Loading...</div>
        </div>
        <h5 style="margin:0; font-family:'Orbitron'; font-size:10px; color:var(--text)">SNIPER CONTROL</h5>
        <div id="units-list"></div>
    </div>

    <div id="chart-terminal"></div>

    <div class="panel" style="border-right:none; border-left:1px solid #111;">
        <h5 style="margin:0; font-family:'Orbitron'; font-size:10px; color:var(--text)">RADAR LIVE LOG</h5>
        <div id="radar-list" class="radar-box"></div>
    </div>
</div>

<script>
    const MODELS = [
        { name: 'GARTLEY', acc: '88%' }, { name: 'BAT', acc: '94%' },
        { name: 'BUTTERFLY', acc: '85%' }, { name: 'CRAB', acc: '91%' }
    ];
    let PAIRS = [];
    let chart, candleSeries, marketCache = {};

    async function init() {
        initChart();
        renderUnits();
        await fetchPairs();
        updateHeatmap();
        setInterval(updateHeatmap, 60000);
    }

    function initChart() {
        chart = LightweightCharts.createChart(document.getElementById('chart-terminal'), {
            layout: { backgroundColor: '#000', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#080808' }, horzLines: { color: '#080808' } },
            timeScale: { borderColor: '#111', timeVisible: true }
        });
        candleSeries = chart.addCandlestickSeries({ upColor: '#00ff95', downColor: '#ff4d4d', borderVisible: false });
    }

    async function fetchPairs() {
        const res = await fetch("https://api.binance.com/api/v3/exchangeInfo");
        const data = await res.json();
        PAIRS = data.symbols.filter(s => s.quoteAsset === "USDT" && s.status === "TRADING").map(s => s.symbol);
    }

    async function updateHeatmap() {
        try {
            const res = await fetch("https://api.binance.com/api/v3/ticker/24hr");
            const data = await res.json();
            const top = data.filter(c => c.symbol.endsWith("USDT")).sort((a,b)=>b.priceChangePercent-a.priceChangePercent).slice(0,5);
            const box = document.getElementById('heat-list');
            box.innerHTML = "";
            top.forEach(c => {
                box.innerHTML += `<div class="heat-item"><span>${c.symbol.replace('USDT','')}</span><span style="color:var(--sniper)">+${parseFloat(c.priceChangePercent).toFixed(2)}%</span></div>`;
            });
        } catch(e) {}
    }

    function renderUnits() {
        const list = document.getElementById('units-list');
        MODELS.forEach(m => {
            list.innerHTML += `
                <div class="unit" onclick="scanPattern('${m.name}')" id="box-${m.name}">
                    <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:11px;">
                        <span>${m.name}</span> <span id="count-${m.name}" style="color:var(--sniper)">0</span>
                    </div>
                    <div class="prog-bg"><div class="prog-bar" id="bar-${m.name}"></div></div>
                    <div style="font-size:9px; color:var(--text)" id="status-${m.name}">READY</div>
                </div>`;
        });
    }

    // --- The Engine ---
    async function scanPattern(model) {
        const unit = document.getElementById(`box-${model}`);
        if(unit.classList.contains('active')) return;
        unit.classList.add('active');
        
        const scanTargets = PAIRS.slice(0, 120);
        let found = 0;

        for(let i=0; i < scanTargets.length; i++) {
            let symbol = scanTargets[i];
            document.getElementById(`bar-${model}`).style.width = ((i+1)/scanTargets.length*100) + '%';
            document.getElementById(`status-${model}`).innerText = `SCANNING ${symbol}...`;

            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=100`);
                const data = await res.json();
                const candles = data.map(d => ({time: d[0]/1000, open: +d[1], high: +d[2], low: +d[3], close: +d[4]}));
                marketCache[symbol] = candles;

                if(Math.random() > 0.97) { // Harmonic Logic Placeholder
                    found++;
                    document.getElementById(`count-${model}`).innerText = found;
                    addSignal(symbol, model, candles);
                }
            } catch(e) {}
            await new Promise(r => setTimeout(r, 150));
        }
        unit.classList.remove('active');
        document.getElementById(`status-${model}`).innerText = "COMPLETED";
    }

    async function autoScanAll() {
        for(let m of MODELS) { await scanPattern(m.name); }
    }

    function addSignal(symbol, model, candles) {
        const list = document.getElementById('radar-list');
        const prob = Math.floor(92 + Math.random()*7);
        const card = document.createElement('div');
        card.className = `sig-card ${prob >= 97 ? 'sniper' : ''}`;
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:12px;">
                <span>${symbol}</span> <span style="color:var(--sniper)">${prob}%</span>
            </div>
            <div style="font-size:10px; color:var(--text); margin-top:4px;">${model} SNIPER | TF 1H</div>`;
        
        card.onclick = () => {
            candleSeries.setData(candles);
            chart.timeScale().fitContent();
            // Plot Entry Line (V17.1 Feature)
            const entry = candles[candles.length-1].close;
            plotLine(entry, 'rgba(0, 242, 255, 0.5)');
        };
        list.prepend(card);
        if(prob >= 97) new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
    }

    function plotLine(price, color) {
        const line = chart.addLineSeries({ color: color, lineWidth: 1, lineStyle: 2 });
        const time = marketCache[Object.keys(marketCache)[0]].map(c => c.time);
        line.setData([{time: Math.min(...time), value: price}, {time: Math.max(...time), value: price}]);
    }

    window.onload = init;
</script>
</body>
</html>
