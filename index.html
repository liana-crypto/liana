<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAYROVEX V18 | Elite Terminal</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
    --bg:#0b0e11; --panel:#161a1e; --accent:#00ff88; --gold:#ffcc00; --text:#d1d4dc;
}
body{
    margin:0; background:var(--bg); color:var(--text); font-family:sans-serif; overflow:hidden; display:flex; flex-direction:column; height:100vh;
}
/* Live Bar */
#live-bar{
    height:50px; background:var(--panel); display:flex; justify-content:space-between; align-items:center; padding:0 15px; border-bottom:1px solid #2b2f36; font-size:14px;
}
.v-tag{color:var(--accent); font-weight:bold;}
.online{color:var(--accent);}
.offline{color:red;}
/* Main Grid */
.main-grid{
    display:grid; grid-template-columns:200px 1fr 250px; flex:1; overflow:hidden;
}
.side-panel{background:var(--panel); border-right:1px solid #2b2f36; overflow-y:auto; padding:10px;}
#prz-radar{border-left:1px solid #2b2f36;}
#chart-container{width:100%; height:100%;}
.prz-card{background:#1e2329; border-right:4px solid var(--gold); padding:10px; margin-bottom:10px; border-radius:4px; font-size:13px;}
.ticker-item{padding:8px; border-bottom:1px solid #2b2f36; display:flex; justify-content:space-between;}
</style>
</head>
<body>

<header id="live-bar">
    <div>NAYROVEX <span class="v-tag">V18</span></div>
    <div id="status" class="offline">● Offline</div>
    <div id="clock">00:00:00</div>
</header>

<div class="main-grid">
    <aside class="side-panel">
        <div style="color:var(--gold); margin-bottom:10px;">Market Watch</div>
        <div id="ticker-list"></div>
    </aside>

    <div id="chart-container"></div>

    <aside id="prz-radar">
        <div style="color:var(--gold); margin-bottom:10px;">PRZ Radar 🎯</div>
        <div id="signal-log">
            <div class="prz-card">بانتظار إشارات الهارمونيك...</div>
        </div>
    </aside>
</div>

<script>
const pairs = ['btcusdt','ethusdt','solusdt','bnbusdt','adausdt','dogeusdt'];
let currentPair = 'btcusdt';
let chart, candleSeries;

// --- 1. إنشاء الشارت
function initChart(){
    chart = LightweightCharts.createChart(document.getElementById('chart-container'),{
        layout:{backgroundColor:'#0b0e11', textColor:'#d1d4dc'},
        grid:{vertLines:{color:'#1f2226'}, horzLines:{color:'#1f2226'}},
        timeScale:{timeVisible:true}
    });
    candleSeries = chart.addCandlestickSeries({
        upColor:'#00ff88', downColor:'#ff3e3e',
        wickUpColor:'#00ff88', wickDownColor:'#ff3e3e',
    });
}

// --- 2. WebSocket حي لكل الأزواج
function startEngine(){
    const streams = pairs.map(p=>`${p}@kline_1h`).join('/');
    const socket = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);

    socket.onopen = ()=>{
        document.getElementById('status').innerText='● Live';
        document.getElementById('status').className='online';
    };

    socket.onmessage=(event)=>{
        const msg=JSON.parse(event.data);
        const k=msg.data.k;
        const symbol=msg.data.s.toLowerCase();

        // تحديث الشارت إذا الزوج الحالي
        if(symbol===currentPair){
            candleSeries.update({
                time:k.t/1000,
                open:parseFloat(k.o),
                high:parseFloat(k.h),
                low:parseFloat(k.l),
                close:parseFloat(k.c)
            });
        }

        // تحديث Market Watch
        updateList(symbol, k.c);

        // تحديث الساعة
        document.getElementById('clock').innerText=new Date().toLocaleTimeString();

        // إذا أغلقت الشمعة
        if(k.x){
            runDeepScan(symbol, parseFloat(k.c));
        }
    };

    socket.onerror=()=>{document.getElementById('status').innerText='● Error'; document.getElementById('status').className='offline';};
}

// --- 3. Market Watch
function updateList(symbol, price){
    let el=document.getElementById(`t-${symbol}`);
    if(!el){
        el=document.createElement('div');
        el.id=`t-${symbol}`;
        el.className='ticker-item';
        document.getElementById('ticker-list').appendChild(el);
    }
    el.innerHTML=`<span>${symbol.toUpperCase()}</span> <span>${parseFloat(price).toFixed(2)}</span>`;
}

// --- 4. PRZ Radar (محاكاة)
function runDeepScan(symbol, price){
    // محاكاة اكتشاف PRZ بنسبة 5%
    if(Math.random()>0.95){
        const container=document.getElementById('signal-log');
        const card=document.createElement('div');
        card.className='prz-card';
        card.innerHTML=`<strong>Gartley Pattern</strong><br>Pair: ${symbol.toUpperCase()}<br>Zone: ${price.toFixed(2)}<br><span style="color:var(--accent)">PRZ Potential: High</span>`;
        container.prepend(card);
        // صوت التنبيه
        new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
    }
}

// --- INIT
initChart();
startEngine();
</script>

</body>
</html>
