<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIANA ULTIMATE - BULLISH ONLY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #000; --gold: #ffd700; --card: #0a0a0a; }
        body { background: var(--bg); color: var(--neon); margin: 0; font-family: 'Tajawal', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { height: 50px; background: #050505; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; border-bottom: 2px solid #1a1a1a; }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 1.1rem; color: var(--neon); }
        .tag { background: var(--neon); color: #000; font-size: 0.65rem; padding: 2px 7px; border-radius: 3px; font-weight: 800; }

        #tv_container { flex: 1; width: 100%; border-bottom: 2px solid #1a1a1a; }
        
        #radar { height: 35vh; background: #050505; overflow-y: auto; padding: 10px; }
        .signal-card { 
            background: var(--card); border: 1px solid #222; border-right: 5px solid var(--neon);
            padding: 12px; margin-bottom: 10px; border-radius: 4px; transition: 0.3s;
        }
        .sig-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .pair-info b { font-family: 'Orbitron'; font-size: 1.1rem; color: #fff; }
        .pat-type { color: var(--gold); font-family: 'Orbitron'; font-size: 0.75rem; font-weight: 900; }
        
        .coords-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .coord-item { background: #111; border: 1px solid #222; text-align: center; padding: 4px 0; border-radius: 2px; }
        .coord-label { display: block; font-size: 0.55rem; color: #666; font-family: 'Orbitron'; }
        .coord-val { font-size: 0.7rem; color: #fff; font-weight: bold; }

        .btn-view { background: var(--neon); color: #000; border: none; padding: 5px 12px; font-weight: 800; border-radius: 3px; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">LIANA <span style="color:#fff">ULTIMATE</span></div>
    <div class="tag">إيجابي فقط | سبوت</div>
</div>

<div id="tv_container"></div>

<div id="radar">
    <div id="list"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const Core = {
    history: new Set(),
    async init() {
        const res = await fetch('https://api.binance.com/api/v3/exchangeInfo').then(r => r.json());
        const pairs = res.symbols.filter(s => 
            s.status === 'TRADING' && s.quoteAsset === 'USDT' && s.isSpotTradingAllowed &&
            !s.symbol.includes('UP') && !s.symbol.includes('DOWN') && !s.symbol.includes('BEAR') && !s.symbol.includes('BULL')
        ).map(s => s.symbol).slice(0, 100);

        for (let s of pairs) { await this.analyze(s); await new Promise(r => setTimeout(r, 80)); }
        setTimeout(() => this.init(), 20000);
    },
    async analyze(s) {
        try {
            const k = await fetch(`https://api.binance.com/api/v3/klines?symbol=${s}&interval=1h&limit=60`).then(r => r.json());
            const c = k.map(d => parseFloat(d[4]));
            let p = [];
            for(let i=2; i<c.length-2; i++) {
                if((c[i]>c[i-1] && c[i]>c[i+1]) || (c[i]<c[i-1] && c[i]<c[i+1])) p.push(c[i]);
            }
            if(p.length < 5) return;
            const pts = p.slice(-5);
            const [X, A, B, C, D] = pts;

            // شرط ليانا: D تحت C (إيجابي صاعد) وتحت A
            if (D < C && D < A && B < A) {
                const xa = Math.abs(A-X), ab = Math.abs(B-A)/xa, ad = Math.abs(D-A)/xa;
                let type = "";
                const t = 0.08; // هامش خطأ متوازن 8%

                if (this.near(ab, 0.618, t) && this.near(ad, 0.786, t)) type = "GARTLEY";
                else if (this.near(ab, 0.382, 0.1) && this.near(ad, 0.886, t)) type = "BAT";
                else if (this.near(ab, 0.786, t) && this.near(ad, 1.27, t)) type = "BUTTERFLY";
                else if (this.near(ab, 0.886, t) && this.near(ad, 1.618, t)) type = "CRAB";
                else if (ad >= 0.88 && ad <= 1.13) type = "SHARK";

                if (type) this.render(s, type, pts);
            }
        } catch(e){}
    },
    near(v, t, e) { return v >= t - e && v <= t + e; },
    render(s, t, pts) {
        const id = s + t;
        if (this.history.has(id)) return;
        this.history.add(id);

        const card = document.createElement('div');
        card.className = 'signal-card';
        card.innerHTML = `
            <div class="sig-top">
                <div class="pair-info"><b>${s}</b> <small style="color:#666">1h</small></div>
                <div class="pat-type">${t} BULLISH</div>
                <button class="btn-view" onclick="UI.show('${s}')">عرض</button>
            </div>
            <div class="coords-grid">
                <div class="coord-item"><span class="coord-label">X</span><span class="coord-val">${pts[0].toFixed(3)}</span></div>
                <div class="coord-item"><span class="coord-label">A</span><span class="coord-val">${pts[1].toFixed(3)}</span></div>
                <div class="coord-item"><span class="coord-label">B</span><span class="coord-val">${pts[2].toFixed(3)}</span></div>
                <div class="coord-item"><span class="coord-label">C</span><span class="coord-val">${pts[3].toFixed(3)}</span></div>
                <div class="coord-item" style="border-color:var(--neon)"><span class="coord-label" style="color:var(--neon)">D</span><span class="coord-val">${pts[4].toFixed(3)}</span></div>
            </div>
        `;
        document.getElementById('list').prepend(card);
    }
};

const UI = {
    show(s) {
        document.getElementById('tv_container').innerHTML = "";
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:"+s, "interval": "60", "theme": "dark",
            "container_id": "tv_container", "locale": "ar", "hide_side_toolbar": false,
            "enable_publishing": false, "allow_symbol_change": true, "details": true
        });
    }
};

window.onload = () => { Core.init(); UI.show('BTCUSDT'); };
</script>
</body>
</html>
