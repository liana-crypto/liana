<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAYROVEX V18 | Smart Hub</title>
    <style>
        :root { --bg: #0b0e11; --panel: #161a1e; --accent: #00ff88; --gold: #ffcc00; --text: #d1d4dc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        header { height: 50px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid #2b2f36; }
        .main-container { display: grid; grid-template-columns: 1fr 300px; flex: 1; }
        .side-panel { background: var(--panel); border-right: 1px solid #2b2f36; padding: 15px; overflow-y: auto; }
        .signal-card { background: #1e2329; border-right: 4px solid var(--gold); padding: 12px; margin-bottom: 10px; border-radius: 4px; cursor: pointer; transition: 0.3s; animation: slideIn 0.3s ease; }
        .signal-card:hover { background: #2b2f36; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        #tv_chart_container { height: 100%; width: 100%; }
        .v-tag { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">NAYROVEX <span class="v-tag">V18 SMART</span></div>
    <div id="status" style="color:var(--accent)">● Intelligent Engine Active</div>
    <div id="clock">00:00:00</div>
</header>

<div class="main-container">
    <div id="tv_chart_container"></div>
    <aside class="side-panel">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:15px;">PRZ Radar 🎯</div>
        <div id="signals-list"></div>
    </aside>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let tvWidget = null;

    // 1. تهيئة الشارت لمرة واحدة فقط (Singleton Pattern)
    function initChart() {
        tvWidget = new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "60",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "ar",
            "toolbar_bg": "#161a1e",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tv_chart_container"
        });
    }

    // 2. تغيير الزوج والفريم بذكاء بدون إعادة تحميل الصفحة
    function smartNavigate(pair, timeframe) {
        if (tvWidget) {
            // ملاحظة: في نسخة الـ Widget العامة، نقوم بتحديث الـ src لضمان السرعة
            const container = document.getElementById('tv_chart_container');
            container.innerHTML = ''; 
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + pair.toUpperCase(),
                "interval": timeframe,
                "theme": "dark",
                "style": "1",
                "locale": "ar",
                "container_id": "tv_chart_container"
            });
        }
    }

    // 3. إضافة إشارة تفاعلية للرادار
    function addSignal(pair, pattern, timeframe, price) {
        const list = document.getElementById('signals-list');
        const card = document.createElement('div');
        card.className = 'signal-card';
        
        // عند الضغط: يتم التغيير فوراً
        card.onclick = () => {
            smartNavigate(pair, timeframe);
            console.log(`Navigating to ${pair} on ${timeframe}m`);
        };

        card.innerHTML = `
            <div style="display:flex; justify-content:space-between">
                <strong>${pair}</strong>
                <span style="color:var(--gold)">${timeframe}m</span>
            </div>
            <div style="color:var(--accent); font-size:12px; margin:5px 0;">${pattern}</div>
            <div style="font-size:13px;">PRZ: ${price}</div>
            <div style="font-size:9px; opacity:0.5; margin-top:5px;">انقر للتحليل الفوري ⚡</div>
        `;
        
        if (list.children.length > 8) list.lastChild.remove();
        list.prepend(card);
    }

    // تحديث الوقت
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG');
    }, 1000);

    // محاكاة وصول إشارات ذكية من الـ Worker
    setTimeout(() => addSignal('ETHUSDT', 'Bullish Gartley', '60', '2410.50'), 2000);
    setTimeout(() => addSignal('SOLUSDT', 'Bearish Bat', '15', '145.20'), 5000);

    window.onload = initChart;
</script>
</body>
</html>
