<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAYRO VEX | NEON BLUE TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #008cff;
            --deep-cyan: #00f2ff;
            --bg-dark: #010409;
            --panel-bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
        }

        body { background: var(--bg-dark); color: #c9d1d9; margin: 0; font-family: 'Tajawal', sans-serif; overflow: hidden; height: 100vh; }

        /* الهيكل التنظيمي الجديد */
        #app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* شريط الحالة العلوي */
        .top-nav { height: 45px; background: var(--panel-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; }
        .logo { font-family: 'Orbitron'; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 10px rgba(0,140,255,0.5); font-size: 1rem; }

        /* منطقة البحث والشارت (في الوسط) */
        #central-zone { flex: 1; display: flex; flex-direction: column; position: relative; border-bottom: 2px solid var(--neon-blue); }
        
        .search-container { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 5px; background: rgba(13,17,23,0.9); padding: 5px; border-radius: 8px; border: 1px solid var(--neon-blue); }
        .search-input { background: none; border: none; color: white; outline: none; width: 120px; font-family: 'Orbitron'; font-size: 0.8rem; }
        .search-btn { background: var(--neon-blue); border: none; color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }

        #tv_chart { flex: 1; width: 100%; }

        /* رادار الإشارات السفلي */
        #radar-section { height: 35vh; background: var(--panel-bg); overflow-y: auto; padding: 10px; }
        .radar-header { color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; }

        /* كرت الإشارة المحدث */
        .signal-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--neon-blue); }
        .sig-left .sym { font-family: 'Orbitron'; font-weight: 800; font-size: 1.1rem; color: #fff; }
        .sig-left .pat-name { display: block; color: var(--deep-cyan); font-size: 0.8rem; font-weight: bold; margin-top: 3px; }
        .tf-label { background: var(--neon-blue); color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px; font-family: 'Orbitron'; margin-right: 8px; }

        .sig-right { text-align: left; }
        .sig-right .price { font-family: 'Orbitron'; color: #fff; font-size: 1.1rem; }
        .sig-right .target { font-size: 0.65rem; color: #8b949e; margin-top: 4px; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div class="top-nav">
        <div class="logo">NAYRO VEX V2.0</div>
        <div id="scan-status" style="font-size: 9px; color: var(--deep-cyan);">GLOBAL SCANNING...</div>
    </div>

    <div id="central-zone">
        <div class="search-container">
            <input type="text" id="coin-search" class="search-input" placeholder="BTCUSDT...">
            <button class="search-btn" onclick="manualSearch()">بحث</button>
        </div>
        <div id="tv_chart"></div>
    </div>

    <div id="radar-section">
        <div class="radar-header">
            <span>LIVE SIGNALS RADAR</span>
            <span id="active-tf" style="color: #666;">ALL TIMEFRAMES</span>
        </div>
        <div id="signal-list"></div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
/** * محرك النماذج الشامل (All Patterns Logic)
 */
const HarmonicLibrary = {
    check(ab, bc, ad, cd) {
        if (ad >= 0.88 && ad <= 1.13) return "SHARK";
        if (ab >= 0.61 && ab <= 0.65 && ad >= 0.78 && ad <= 0.79) return "GARTLEY";
        if (ab >= 0.38 && ab <= 0.52 && ad >= 0.88 && ad <= 0.89) return "BAT";
        if (ab >= 0.78 && ab <= 0.82 && ad >= 1.27 && ad <= 1.61) return "BUTTERFLY";
        if (ab >= 0.38 && ab <= 0.61 && ad >= 1.61 && ad <= 2.61) return "CRAB";
        if (bc >= 1.27 && bc <= 1.41 && ad <= 0.78) return "CYPHER";
        return null;
    }
};

const Scanner = {
    async start() {
        const pairs = await this.getSymbols();
        for (let i = 0; i < pairs.length; i += 10) {
            const batch = pairs.slice(i, i + 10);
            await Promise.all(batch.map(s => this.scanSymbol(s)));
            await new Promise(r => setTimeout(r, 800));
        }
    },

    async getSymbols() {
        const r = await fetch('https://api.binance.com/api/v3/exchangeInfo');
        const d = await r.json();
        return d.symbols.filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING').map(s => s.symbol);
    },

    async scanSymbol(symbol) {
        const tfs = ['15m', '1h', '4h'];
        for (const tf of tfs) {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=60`);
                const k = await res.json();
                const closes = k.map(c => parseFloat(c[4]));
                const points = this.getZigZag(closes);
                
                if (points.length < 5) continue;
                const [X, A, B, C, D] = points.map(p => p.v);
                const ab = Math.abs(A-B)/Math.abs(X-A);
                const bc = Math.abs(B-C)/Math.abs(A-B);
                const ad = Math.abs(A-D)/Math.abs(X-A);

                const pattern = HarmonicLibrary.check(ab, bc, ad);
                if (pattern) UI.showSignal(symbol, pattern, tf, D);
            } catch(e) {}
        }
    },

    getZigZag(data) {
        let pts = [];
        for(let i=2; i<data.length-2; i++) {
            if(data[i] > data[i-1] && data[i] > data[i+1]) pts.push({v: data[i], t: 'H'});
            if(data[i] < data[i-1] && data[i] < data[i+1]) pts.push({v: data[i], t: 'L'});
        }
        return pts.slice(-5);
    }
};

const UI = {
    showSignal(sym, pat, tf, pr) {
        const list = document.getElementById('signal-list');
        const id = `${sym}-${pat}-${tf}`;
        if (document.getElementById(id)) return;

        const card = document.createElement('div');
        card.id = id;
        card.className = 'signal-card';
        card.innerHTML = `
            <div class="sig-left">
                <span class="tf-label">${tf.toUpperCase()}</span>
                <span class="sym">${sym}</span>
                <span class="pat-name">${pat} DETECTED</span>
            </div>
            <div class="sig-right">
                <div class="price">$${pr.toFixed(pr < 1 ? 4 : 2)}</div>
                <div class="target">TP: AUTO | SL: SWING</div>
            </div>
        `;
        card.onclick = () => this.loadChart(sym, tf);
        list.prepend(card);
    },

    loadChart(sym, tf) {
        const tfMap = {'15m':'15', '1h':'60', '4h':'240'};
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:"+sym, "interval": tfMap[tf] || "60",
            "theme": "dark", "style": "1", "locale": "ar", "container_id": "tv_chart",
            "toolbar_bg": "#0d1117", "enable_publishing": false, "hide_side_toolbar": false
        });
    }
};

function manualSearch() {
    const coin = document.getElementById('coin-search').value.toUpperCase();
    if(coin) UI.loadChart(coin, '1h');
}

window.onload = () => {
    UI.loadChart('BTCUSDT', '60');
    Scanner.start();
    setInterval(() => Scanner.start(), 300000);
};
</script>
</body>
</html>
