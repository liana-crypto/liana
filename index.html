<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LIANA V13.1 | NAYROVEX ELITE</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
<style>
:root { --bg:#000; --neon:#00ff41; --GARTLEY:#00ff41; --BAT:#00d4ff; --BUTTERFLY:#bf00ff; }
body { margin:0; font-family:'Tajawal', sans-serif; background:var(--bg); color:#fff; overflow:hidden; height:100vh; display:flex; flex-direction:column; }

/* Status Bar */
.status-bar { font-size: 0.65rem; color: #888; padding: 10px 15px; font-family: Orbitron; background: #050505; border-bottom: 2px solid #111; display: flex; justify-content: space-between; align-items: center; }

/* Radar Section */
.radar-section { height: 32vh; position: relative; background: radial-gradient(circle, #081a08 0%, #000 85%); border-bottom: 2px solid #111; }
#radarCanvas { position: absolute; z-index: 1; width: 100%; height: 100%; }

/* Chart Container */
#chart_container { height: 38vh; width: 100%; background: #000; border-bottom: 1px solid #1a1a1a; }

/* Search & List */
.search-container { padding: 8px; background: #080808; display: flex; gap: 5px; }
#search-input { flex: 1; background: #000; border: 1px solid #1a1a1a; padding: 12px; border-radius: 5px; color: var(--neon); font-family: 'Orbitron'; outline: none; transition: 0.3s; }
#search-input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,255,65,0.1); }

.radar-list { flex:1; overflow-y:auto; padding:10px; background: #000; }
.sig-card { 
    background:#0d0d0d; border:1px solid #1a1a1a; padding:12px; margin-bottom:8px; 
    border-right:4px solid var(--neon); display:flex; justify-content:space-between; 
    align-items:center; cursor:pointer; position: relative;
}
.new-target-tag { position:absolute; top:-5px; left:-5px; background:var(--neon); color:#000; font-size:0.5rem; padding:2px 5px; font-weight:900; }

/* Overlay */
#overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; display:flex; justify-content:center; align-items:center; flex-direction:column; border: 1px solid var(--neon); }
.btn-start { padding: 20px 40px; border: 2px solid var(--neon); color: var(--neon); background: transparent; font-family: Orbitron; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div id="overlay">
    <h1 style="font-family:Orbitron; color:var(--neon); letter-spacing: 5px;">NAYROVEX V13.1</h1>
    <button class="btn-start" onclick="Sniper.startSystem()">INITIALIZE SYSTEM</button>
</div>

<div class="status-bar">
    <div>GEAR: <span id="log-status" style="color:var(--neon)">STANDBY</span></div>
    <div id="target-count" style="color:var(--neon); font-weight:bold;">FOUND: 0</div>
</div>

<div class="radar-section">
    <canvas id="radarCanvas"></canvas>
</div>

<div id="chart_container"></div>

<div class="search-container">
    <input type="text" id="search-input" placeholder="SNIPE_TARGET_BY_NAME..." oninput="Sniper.liveFilter(this.value)">
</div>

<div class="radar-list" id="radar-list"></div>

<script>
const Sniper = {
    canvas:null, ctx:null, chart:null, candleSeries:null, activeSeries:[],
    points:[], signals:new Map(), radarAngle:0, foundCount:0, currentTF:'1h',
    alertSound: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),

    startSystem() {
        document.getElementById('overlay').style.display = 'none';
        this.alertSound.play().catch(()=>{});
        this.init();
    },

    init() {
        this.canvas = document.getElementById('radarCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', ()=>this.resize());

        const container = document.getElementById('chart_container');
        this.chart = LightweightCharts.createChart(container, {
            layout: { backgroundColor: '#000', textColor: '#d1d4dc' },
            grid: { vertLines: { visible: false }, horzLines: { color: '#080808' } },
            width: container.clientWidth, height: container.clientHeight
        });
        this.candleSeries = this.chart.addCandlestickSeries({ upColor: '#00ff41', downColor: '#ff3131', borderVisible: false });

        this.animateRadar();
        this.loadPairs(50);
    },

    resize() {
        if(!this.canvas) return;
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight * 0.32;
    },

    animateRadar() {
        const { ctx, canvas } = this;
        const cx = canvas.width/2, cy = canvas.height/2;
        const radius = Math.min(cx,cy)-20;
        ctx.clearRect(0,0,canvas.width,canvas.height);

        ctx.strokeStyle='rgba(0,255,65,0.1)';
        for(let r=1;r<=3;r++){ctx.beginPath();ctx.arc(cx,cy,(radius/3)*r,0,Math.PI*2);ctx.stroke();}

        ctx.save();
        ctx.translate(cx,cy); ctx.rotate(this.radarAngle);
        let grad = ctx.createLinearGradient(0,0,radius,0);
        grad.addColorStop(1, 'rgba(0,255,65,0.15)');
        ctx.fillStyle=grad; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,radius,-0.4,0); ctx.fill();
        ctx.restore();

        this.points.forEach(p=>{
            if(p.hidden) return;
            if(p.isNew){
                ctx.strokeStyle=p.color; ctx.lineWidth=1;
                ctx.beginPath(); ctx.arc(p.x,p.y,8+Math.sin(Date.now()/100)*6,0,Math.PI*2); ctx.stroke();
            }
            ctx.fillStyle = p.highlight?'#fff':p.color;
            ctx.shadowBlur = p.highlight?15:5; ctx.shadowColor=p.color;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.highlight?6:4,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0; ctx.fillStyle="#fff"; ctx.font="8px Orbitron";
            ctx.fillText(p.symbol,p.x+8,p.y-8);
        });

        this.radarAngle +=0.04;
        requestAnimationFrame(()=>this.animateRadar());
    },

    async loadPairs(limit=50){
        const info = await fetch('https://api.binance.com/api/v3/exchangeInfo').then(r=>r.json());
        this.pairs = info.symbols.filter(s=>s.quoteAsset==='USDT' && s.status==='TRADING').map(s=>s.symbol).slice(0,limit);
        this.startScanner();
    },

    async analyze(s){
        try{
            document.getElementById('log-status').innerText=`SCANNING: ${s}`;
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${s}&interval=${this.currentTF}&limit=100`);
            const data = await res.json();
            const close = data.map(d=>+d[4]);
            let pivots = [];
            for(let i=1;i<close.length-1;i++){
                if((close[i]>close[i-1] && close[i]>close[i+1]) || (close[i]<close[i-1] && close[i]<close[i+1]))
                    pivots.push({v:close[i], t:data[i][0]/1000});
            }
            if(pivots.length<5) return;
            const pts=pivots.slice(-5);
            const [X,A,B,C,D] = pts.map(p=>p.v);
            const xa=Math.abs(A-X), ab=Math.abs(B-A)/xa;
            let m=(ab>=0.3&&ab<=0.7)?"GARTLEY":(ab>0.7&&ab<=1.1)?"BAT":(ab>1.1&&ab<=1.4)?"BUTTERFLY":"";
            if(m) this.addSignal(s,m,pts);
        }catch(e){}
    },

    addSignal(s,m,pts){
        if(this.signals.has(s)) return;
        const cx=this.canvas.width/2, cy=this.canvas.height/2;
        const r=(Math.min(cx,cy)-60)*Math.random()+20;
        const a=Math.random()*Math.PI*2;
        const colors={GARTLEY:'#00ff41', BAT:'#00d4ff', BUTTERFLY:'#bf00ff'};
        const p={symbol:s,x:cx+r*Math.cos(a),y:cy+r*Math.sin(a),color:colors[m],highlight:true,pts,model:m,hidden:false,isNew:true};
        this.points.push(p); this.signals.set(s,p); this.foundCount++;
        document.getElementById('target-count').innerText=`FOUND: ${this.foundCount}`;
        this.alertSound.play().catch(()=>{});

        const card=document.createElement('div');
        card.id=`card-${s}`; card.className='sig-card'; card.style.borderRightColor=colors[m];
        card.style.opacity = '0'; card.style.transform = 'translateX(20px)'; card.style.transition = '0.5s';
        card.innerHTML=`<div class="new-target-tag">NEW</div><div><b>${s}</b><br><small style="color:${colors[m]}">${m}</small></div><div>$${pts[4].v.toLocaleString()}</div>`;
        card.onclick=()=>this.showTarget(s);
        document.getElementById('radar-list').prepend(card);

        setTimeout(() => { card.style.opacity = '1'; card.style.transform = 'translateX(0)'; }, 10);
        this.showTarget(s);
        setTimeout(()=>{p.isNew=false;},10000);
    },

    liveFilter(val){
        const q=val.toUpperCase();
        this.points.forEach(p=>{
            p.hidden = q!=="" && !p.symbol.toUpperCase().includes(q);
            const card=document.getElementById(`card-${p.symbol}`);
            if(card) card.style.display=p.hidden?'none':'flex';
        });
    },

    showTarget(s){
        const data=this.signals.get(s);
        if(!data) return;
        this.points.forEach(p=>p.highlight=p.symbol===s);
        fetch(`https://api.binance.com/api/v3/klines?symbol=${s}&interval=${this.currentTF}&limit=120`)
        .then(r=>r.json()).then(k=>{
            this.candleSeries.setData(k.map(d=>({time:d[0]/1000,open:+d[1],high:+d[2],low:+d[3],close:+d[4]})));
            this.drawPattern(data.pts,data.model);
            this.chart.timeScale().fitContent();
        });
    },

    drawPattern(pts,m){
        this.activeSeries.forEach(s=>this.chart.removeSeries(s));
        const colors={GARTLEY:'#00ff41', BAT:'#00d4ff', BUTTERFLY:'#bf00ff'};
        const line=this.chart.addLineSeries({color:colors[m], lineWidth:2});
        line.setData(pts.map(p=>({time:p.t,value:p.v})));
        this.candleSeries.setMarkers(pts.map((p,i)=>({time:p.t,position:'aboveBar',color:colors[m],shape:'arrowDown',text:['X','A','B','C','D'][i]})));
        this.activeSeries=[line];
    },

    startScanner(){
        let idx=0;
        const scan=async()=>{
            await this.analyze(this.pairs[idx]);
            idx=(idx+1)%this.pairs.length;
            setTimeout(scan,1200);
        };
        scan();
    }
};
</script>
</body>
</html>
