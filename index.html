<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NayroVex Elite v8.1 | Multi-TF Beast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        :root { --nx-cyan: #00f7ff; --nx-purple: #a855f7; --nx-bg: #030303; }
        body { background-color: var(--nx-bg); color: #ffffff; font-family: 'JetBrains+Mono', monospace; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s; }
        .glass:hover { border-color: var(--nx-cyan); box-shadow: 0 0 30px rgba(0, 247, 255, 0.1); }
        .signal-card { border-right: 4px solid var(--nx-cyan); animation: slide-in 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes slide-in { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .grid-bg { background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 30px 30px; position: fixed; inset: 0; z-index: -1; }
        .tf-tag { font-[7px] px-2 py-0.5 rounded bg-white/5 border border-white/10 text-gray-400; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="grid-bg"></div>

    <header class="p-4 flex justify-between items-center glass sticky top-0 z-[100] border-b border-white/10">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-cyan-500 to-purple-600 rounded-2xl flex items-center justify-center font-black text-black shadow-lg">NV</div>
            <div>
                <h1 class="text-md font-black tracking-[0.4em] uppercase">NayroVex <span class="text-cyan-400">v8.1</span></h1>
                <p class="text-[7px] font-bold text-gray-500 tracking-[0.2em]">ULTIMATE MULTI-TIMEFRAME ENGINE</p>
            </div>
        </div>
        <button onclick="requestNotify()" id="notif-btn" class="text-[9px] font-black bg-white/5 border border-white/10 px-4 py-2 rounded-full hover:bg-cyan-500 hover:text-black transition-all">ENABLE NOTIFICATIONS 🔔</button>
    </header>

    <main class="p-6 max-w-[1900px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <section class="lg:col-span-4 space-y-4">
            <h2 class="text-[9px] font-black text-cyan-400 tracking-[0.5em] uppercase italic">// 01. Multi_TF_Scanner</h2>
            <div id="beast-signals" class="glass rounded-[2.5rem] p-5 h-[750px] overflow-y-auto space-y-4">
                <div class="text-center py-32 text-gray-600 italic text-[10px] tracking-[0.3em]">SYNCHRONIZING TIMEFRAMES... 🛰️</div>
            </div>
        </section>

        <section class="lg:col-span-8 space-y-4">
            <h2 class="text-[9px] font-black text-purple-500 tracking-[0.5em] uppercase italic">// 02. Neural_Market_Analysis</h2>
            <div class="glass rounded-[2.5rem] overflow-hidden h-[750px]">
                <div id="tradingview_full" class="h-full"></div>
            </div>
        </section>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "15", "theme": "dark", "container_id": "tradingview_full", "style": "1", "locale": "ar", "hide_side_toolbar": false });

        const signalsBox = document.getElementById('beast-signals');

        // Request Browser Notification Permission
        function requestNotify() {
            Notification.requestPermission().then(p => {
                if(p === 'granted') document.getElementById('notif-btn').innerText = "NOTIFICATIONS ACTIVE ✅";
            });
        }

        // --- Math Core ---
        function calculateRSI(closes, period = 14) {
            if (closes.length < period) return 50;
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                let d = closes[i] - closes[i - 1];
                d >= 0 ? gains += d : losses -= d;
            }
            let avgG = gains / period, avgL = losses / period;
            for (let i = period + 1; i < closes.length; i++) {
                let d = closes[i] - closes[i - 1];
                avgG = (avgG * (period - 1) + (d > 0 ? d : 0)) / period;
                avgL = (avgL * (period - 1) + (d < 0 ? -d : 0)) / period;
            }
            return 100 - (100 / (1 + avgG / avgL));
        }

        function calculateEMA(prices, period) {
            const k = 2 / (period + 1);
            let ema = prices[0];
            for (let i = 1; i < prices.length; i++) ema = (prices[i] * k) + (ema * (1 - k));
            return ema;
        }

        // --- Data & Logic Engine ---
        async function fetchTFData(symbol, interval) {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=100`);
            const d = await r.json();
            return d.map(k => parseFloat(k[4]));
        }

        async function runUltimateEngine() {
            const symbols = ["BTCUSDT", "ETHUSDT", "SOLUSDT"];
            for (const sym of symbols) {
                const [c5m, c15m, c1h] = await Promise.all([
                    fetchTFData(sym, '5m'), fetchTFData(sym, '15m'), fetchTFData(sym, '1h')
                ]);

                const rsi5 = calculateRSI(c5m), rsi15 = calculateRSI(c15m), rsi1h = calculateRSI(c1h);
                const ema20 = calculateEMA(c15m, 20), ema50 = calculateEMA(c15m, 50);
                const price = c15m[c15m.length - 1];

                // 🔥 ULTIMATE STRATEGY: 3-TF RSI Sync + EMA Cross Confirmation
                let signal = null;
                if (rsi5 < 35 && rsi15 < 40 && price > ema20) {
                    signal = { type: 'ULTRA BUY ⚡', color: 'text-cyan-400', bg: 'bg-cyan-500/5', desc: 'Triple RSI Oversold + Bullish EMA Support' };
                } else if (rsi5 > 65 && rsi15 > 60 && price < ema20) {
                    signal = { type: 'ULTRA SELL ⚠️', color: 'text-red-500', bg: 'bg-red-500/5', desc: 'Triple RSI Overbought + Bearish EMA Resistance' };
                }

                if (signal) createUltimateUI(sym, signal, rsi5, rsi15, rsi1h, price);
            }
        }

        function createUltimateUI(sym, sig, r5, r15, r1h, price) {
            if ([...signalsBox.children].some(el => el.innerText.includes(sym))) return;
            if (signalsBox.innerText.includes("SYNCHRONIZING")) signalsBox.innerHTML = '';

            const el = document.createElement('div');
            el.className = `glass p-6 rounded-[2.5rem] signal-card ${sig.bg} border-white/5`;
            el.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-black tracking-widest">${sym}</span>
                    <div class="flex gap-1">
                        <span class="tf-tag">5M: ${r5.toFixed(0)}</span>
                        <span class="tf-tag">15M: ${r15.toFixed(0)}</span>
                        <span class="tf-tag">1H: ${r1h.toFixed(0)}</span>
                    </div>
                </div>
                <div class="text-2xl font-black italic mb-2 ${sig.color}">${sig.type}</div>
                <p class="text-[9px] text-gray-400 font-bold border-t border-white/5 pt-4">
                    <span class="text-purple-400 tracking-[0.2em] uppercase">Reason:</span> ${sig.desc}<br>
                    <span class="opacity-50 mt-1 block tracking-tighter uppercase font-black">Target Entry: $${price.toLocaleString()}</span>
                </p>
            `;
            signalsBox.prepend(el);
            if (Notification.permission === 'granted') {
                new Notification(`NayroVex Alert: ${sym}`, { body: `${sig.type} at ${price}` });
            }
        }

        setInterval(runUltimateEngine, 20000);
        runUltimateEngine();
    </script>
</body>
</html>
