<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIANA PRO-X</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --army: #4b5320; --neon: #00ff41; --bg: #010101; }
        body { background: var(--bg); color: var(--neon); margin: 0; font-family: 'Tajawal', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* هيدر نظيف بدون أسماء إضافية */
        .header { height: 45px; background: #000; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; border-bottom: 2px solid var(--army); }
        .logo { font-family: 'Orbitron'; font-weight: 900; color: var(--neon); font-size: 1.1rem; }
        
        .auto-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.65rem; color: #fff; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--neon); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* أزرار النماذج */
        .controls { background: #080808; padding: 6px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-act { background: #000; border: 1px solid var(--army); color: var(--army); padding: 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.6rem; font-weight: bold; transition: 0.2s; }
        .btn-act.active { background: var(--army); color: #000; box-shadow: 0 0 10px var(--neon); border-color: var(--neon); }

        #tv_container { flex: 1; width: 100%; border-bottom: 2px solid var(--army); background: #000; }
        
        #radar { height: 28vh; background: #000; overflow-y: auto; padding: 8px; }
        .sig-row { 
            background: rgba(0, 255, 65, 0.05); border: 1px solid var(--army); 
            padding: 10px; margin-bottom: 6px; display: flex; justify-content: space-between; 
            align-items: center; border-right: 4px solid var(--neon);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .sig-info b { font-family: 'Orbitron'; font-size: 0.9rem; color: #fff; }
        .pat-name { color: var(--neon); font-size: 0.7rem; font-weight: bold; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">LIANA PRO-X</div>
    <div class="auto-toggle">
        <span>AUTO-SWITCH</span>
        <label class="switch">
            <input type="checkbox" id="autoMode" checked>
            <span class="slider"></span>
        </label>
    </div>
</div>

<div class="controls">
    <button class="btn-act" onclick="Engine.toggle('BUTTERFLY')">BUTTERFLY</button>
    <button class="btn-act" onclick="Engine.toggle('BAT')">BAT</button>
    <button class="btn-act" onclick="Engine.toggle('GARTLEY')">GARTLEY</button>
    <button class="btn-act" onclick="Engine.toggle('SHARK')">SHARK</button>
    <button class="btn-act" onclick="Engine.toggle('CYPHER')">CYPHER</button>
    <button class="btn-act" onclick="Engine.toggle('CRAB')">CRAB</button>
</div>

<div id="tv_container"></div>
<div id="radar"><div id="list"></div></div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const Logic = {
    selected: new Set(),
    check(pts) {
        if (pts.length < 5) return null;
        const [X, A, B, C, D] = pts.map(p => p.v);
        const xa = Math.abs(A-X), ab = Math.abs(B-A)/xa, ad = Math.abs(D-A)/xa;
        const t = 0.08; 
        if (this.near(ab, 0.618, t) && this.near(ad, 0.786, t)) return "GARTLEY";
        if (this.near(ab, 0.447, 0.15) && this.near(ad, 0.886, t)) return "BAT";
        if (this.near(ab, 0.786, t) && this.near(ad, 1.27, t)) return "BUTTERFLY";
        if (this.near(ab, 0.886, 0.15) && this.near(ad, 1.618, t)) return "CRAB";
        if (this.near(ad, 0.786, 0.12)) return "CYPHER";
        if (ad >= 0.886 && ad <= 1.13) return "SHARK";
        return null;
    },
    near(v, t, e) { return v >= t - e && v <= t + e; }
};

const Engine = {
    running: false,
    lastSwitch: 0,
    history: new Set(),
    async toggle(p) {
        const btn = Array.from(document.querySelectorAll('.btn-act')).find(b => b.innerText === p);
        if (Logic.selected.has(p)) { Logic.selected.delete(p); btn.classList.remove('active'); }
        else { Logic.selected.add(p); btn.classList.add('active'); if (!this.running) { this.running = true; this.scan(); } }
    },
    async scan() {
        while (this.running) {
            try {
                const res = await fetch('https://api.binance.com/api/v3/exchangeInfo').then(r => r.json());
                // فلترة ذكية: استثناء العملات المحذوفة BEAR/BULL والعملات غير النشطة
                const activePairs = res.symbols.filter(s => s.status === 'TRADING' && s.quoteAsset === 'USDT' && !s.symbol.includes('BEAR') && !s.symbol.includes('BULL')).map(s => s.symbol).slice(0, 150);
                
                for (let s of activePairs) {
                    if (Logic.selected.size === 0) break;
                    await this.analyze(s);
                    await new Promise(r => setTimeout(r, 40));
                }
            } catch (e) {}
            await new Promise(r => setTimeout(r, 15000));
        }
    },
    async analyze(s) {
        for (let tf of ['15m', '1h']) {
            try {
                const k = await fetch(`https://api.binance.com/api/v3/klines?symbol=${s}&interval=${tf}&limit=45`).then(res => res.json());
                const d = k.map(c => parseFloat(c[4]));
                const pts = this.getPivots(d);
                const res = Logic.check(pts);
                if (res && Logic.selected.has(res)) this.trigger(s, res, tf);
            } catch (e) {}
        }
    },
    getPivots(d) {
        let p = [];
        for (let i = 2; i < d.length - 2; i++) {
            if ((d[i] > d[i-1] && d[i] > d[i+1]) || (d[i] < d[i-1] && d[i] < d[i+1])) p.push({v: d[i]});
        }
        return p.slice(-5);
    },
    trigger(s, p, tf) {
        const id = `${s}-${p}-${tf}`;
        if (this.history.has(id)) return;
        this.history.add(id);

        const row = document.createElement('div');
        row.className = 'sig-row';
        row.innerHTML = `<div class="sig-info"><b>${s}</b> <small style="color:var(--army)">/ ${tf}</small></div><div class="pat-name">${p}</div>`;
        row.onclick = () => UI.update(s, tf);
        document.getElementById('list').prepend(row);

        if (document.getElementById('autoMode').checked && (Date.now() - this.lastSwitch > 12000)) {
            this.lastSwitch = Date.now();
            UI.update(s, tf);
        }
    }
};

const UI = {
    update(s, t) {
        const tfMap = { '15m': '15', '1h': '60' };
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:"+s, "interval": tfMap[t] || "60",
            "theme": "dark", "container_id": "tv_container", "locale": "ar", "style": "1"
        });
    }
};
window.onload = () => UI.update('BTCUSDT', '1h');
</script>
</body>
</html>
