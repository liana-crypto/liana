<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAYRO VEX - LIQUIDITY TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-green: #00ff66; --deep-dark: #050608; --panel-bg: #0d0e12; --border: #1e222d; }
        body { background: var(--deep-dark); color: white; margin: 0; font-family: 'Tajawal', sans-serif; overflow: hidden; height: 100vh; }
        
        #main-layout { display: flex; flex-direction: column; height: 100vh; }
        
        .status-bar { height: 35px; background: #000; font-size: 0.7rem; display: flex; align-items: center; padding: 0 15px; color: var(--neon-green); border-bottom: 1px solid var(--border); font-family: 'Orbitron'; }
        
        #chart-area { flex: 2; background: #000; position: relative; }
        
        #scanner-area { flex: 1.5; background: var(--panel-bg); overflow-y: auto; padding: 15px; border-top: 2px solid var(--border); }
        
        .signal-card { border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; background: #161a23; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; cursor: pointer; }
        .signal-card:active { transform: scale(0.98); }
        .signal-card.liquid-boost { border-right: 4px solid var(--neon-green); }
        
        .pair-info { display: flex; flex-direction: column; }
        .sym { font-family: 'Orbitron'; font-weight: 900; font-size: 1.1rem; }
        .tf-tag { font-size: 0.6rem; background: var(--neon-green); color: #000; padding: 1px 5px; border-radius: 3px; width: fit-content; margin-top: 4px; font-weight: bold; }
        
        .pattern-name { color: var(--neon-green); font-weight: bold; font-size: 0.9rem; margin-top: 5px; }
        .price-info { text-align: left; }
        .price { font-family: 'Orbitron'; font-size: 1rem; }
        .liq-badge { font-size: 0.6rem; color: #555; margin-top: 5px; }

        .live-dot { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; animation: pulse 1s infinite; margin-left: 10px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="main-layout">
    <div class="status-bar">
        <div class="live-dot"></div>
        <span id="status-text">SYSTEM: SCANNING LIVE LIQUIDITY</span>
    </div>
    
    <div id="chart-area">
        <div id="tv_chart_container" style="height: 100%;"></div>
    </div>

    <div id="scanner-area">
        <h3 style="font-size: 0.8rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; color: var(--neon-green); font-family: 'Orbitron';">
            LIQUIDITY & HARMONIC RADAR
        </h3>
        <div id="list-container">
            <div style="text-align:center; color:#444; margin-top:20px;">Initializing Core Logic...</div>
        </div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
// الإعدادات العامة
const CONFIG = {
    pairs: ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'XRPUSDT', 'AVAXUSDT'],
    timeframes: ['15m', '1h', '4h']
};

// الجزء 2: منطق النماذج
const HarmonicLogic = {
    isGartley: (ab, ad) => (ab >= 0.61 && ab <= 0.65 && ad >= 0.78 && ad <= 0.79),
    isBat: (ab, ad) => (ab >= 0.38 && ab <= 0.52 && ad >= 0.88 && ad <= 0.89),
    isButterfly: (ab, ad) => (ab >= 0.78 && ab <= 0.82 && ad >= 1.27 && ad <= 1.30),
    isCrab: (ab, ad) => (ab >= 0.38 && ab <= 0.65 && ad >= 1.60 && ad <= 1.62),
    isShark: (ad) => (ad >= 0.88 && ad <= 1.13),
    isCypher: (ab, ad) => (ab >= 0.38 && ab <= 0.62 && ad <= 0.78)
};

// الجزء 4: محرك ZigZag
function calculateZigZag(data) {
    let points = [];
    for (let i = 2; i < data.length - 2; i++) {
        if (data[i] > data[i-1] && data[i] > data[i+1]) points.push({price: data[i], type: 'H'});
        if (data[i] < data[i-1] && data[i] < data[i+1]) points.push({price: data[i], type: 'L'});
    }
    return points.slice(-5);
}

// الجزء 5: محرك السيولة
const LiquidityEngine = {
    checkVolumeSpike: (volumes) => {
        const lastVol = volumes[volumes.length - 1];
        const avgVol = volumes.slice(-10).reduce((a, b) => a + b, 0) / 10;
        return lastVol > (avgVol * 2.2);
    }
};

// الجزء 7: المتحكم الرئيسي
const MasterController = {
    async executeFullScan() {
        const container = document.getElementById('list-container');
        let foundCount = 0;

        for (const symbol of CONFIG.pairs) {
            for (const tf of CONFIG.timeframes) {
                try {
                    const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=50`);
                    const klines = await response.json();
                    const closes = klines.map(k => parseFloat(k[4]));
                    const volumes = klines.map(k => parseFloat(k[5]));
                    
                    const points = calculateZigZag(closes);
                    if (points.length < 5) continue;

                    const [X, A, B, C, D] = points.map(p => p.price);
                    const ab = Math.abs(A-B)/Math.abs(X-A);
                    const ad = Math.abs(A-D)/Math.abs(X-A);

                    let pattern = null;
                    if (HarmonicLogic.isGartley(ab, ad)) pattern = "GARTLEY";
                    else if (HarmonicLogic.isBat(ab, ad)) pattern = "BAT";
                    else if (HarmonicLogic.isButterfly(ab, ad)) pattern = "BUTTERFLY";
                    else if (HarmonicLogic.isShark(ad)) pattern = "SHARK";

                    if (pattern) {
                        if (foundCount === 0) container.innerHTML = '';
                        foundCount++;
                        const isLiquid = LiquidityEngine.checkVolumeSpike(volumes);
                        UI_Renderer.addSignalCard(symbol, pattern, tf, D, isLiquid);
                        new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play().catch(()=>{});
                    }
                } catch (e) { console.error(e); }
            }
        }
        document.getElementById('status-text').innerText = `LAST SCAN: ${new Date().toLocaleTimeString()}`;
    }
};

// الجزء 8: محرك الرسوميات
const UI_Renderer = {
    addSignalCard(symbol, pattern, tf, price, isLiquid) {
        const container = document.getElementById('list-container');
        const card = document.createElement('div');
        card.className = `signal-card ${isLiquid ? 'liquid-boost' : ''}`;
        card.innerHTML = `
            <div class="pair-info">
                <span class="sym">${symbol}</span>
                <span class="tf-tag">${tf.toUpperCase()}</span>
                <span class="pattern-name">${pattern}</span>
            </div>
            <div class="price-info">
                <div class="price">$${price.toFixed(2)}</div>
                <div class="liq-badge">${isLiquid ? '🔥 HIGH VOL' : 'NORMAL VOL'}</div>
            </div>
        `;
        card.onclick = () => loadChart(symbol, tf === '15m' ? '15' : (tf === '1h' ? '60' : '240'));
        container.prepend(card);
    }
};

function loadChart(symbol, interval) {
    new TradingView.widget({
        "autosize": true, "symbol": "BINANCE:" + symbol, "interval": interval,
        "timezone": "Africa/Algiers", "theme": "dark", "style": "1",
        "locale": "ar", "container_id": "tv_chart_container", "hide_side_toolbar": true
    });
}

// الجزء 9: الإقلاع
window.onload = () => {
    loadChart('BTCUSDT', '60');
    MasterController.executeFullScan();
    setInterval(() => MasterController.executeFullScan(), 60000);
};
</script>
</body>
</html>
