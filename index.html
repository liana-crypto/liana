<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIANA ELITE V12</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --army: #4b5320; --neon: #00ff41; --bg: #050505; --dark: #0a0a0a; }
        body { background: var(--bg); color: var(--neon); margin: 0; font-family: 'Tajawal', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header & Status */
        .status-header { height: 40px; background: #000; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; border-bottom: 2px solid var(--army); font-size: 0.7rem; }
        .logo { font-family: 'Orbitron'; font-weight: 900; color: var(--neon); font-size: 1.4rem; text-shadow: 0 0 10px var(--neon); }
        .scanning-loader { display: flex; align-items: center; gap: 8px; color: var(--army); font-family: 'Orbitron'; }
        .dot { width: 6px; height: 6px; background: var(--neon); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.5); } }

        /* Patterns Control */
        .pattern-grid { background: var(--dark); padding: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; border-bottom: 1px solid var(--army); }
        .p-btn { 
            background: #0d0d0d; border: 1px solid var(--army); color: var(--army); 
            padding: 12px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron'; 
            font-size: 0.7rem; transition: 0.3s; font-weight: bold;
        }
        .p-btn.active { background: var(--army); color: #000; box-shadow: 0 0 15px var(--neon); border-color: var(--neon); }

        /* Main Viewports */
        #tv_container { flex: 1; width: 100%; border-bottom: 2px solid var(--army); }
        #radar { height: 35vh; background: #010101; overflow-y: auto; padding: 12px; }

        /* Radar Items */
        .sig-card { 
            background: rgba(75, 83, 32, 0.1); border: 1px solid var(--army); 
            padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; 
            align-items: center; border-right: 4px solid var(--neon); cursor: pointer;
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        .coin-info b { font-family: 'Orbitron'; font-size: 1.1rem; color: #fff; letter-spacing: 1px; }
        .tag { font-size: 0.75rem; color: var(--neon); font-weight: bold; display: block; margin-top: 5px; text-transform: uppercase; }
        .price-box { font-family: 'Orbitron'; text-align: left; }
    </style>
</head>
<body>

<div class="status-header">
    <div class="logo">LIANA</div>
    <div class="scanning-loader">
        <span class="dot"></span>
        <span id="engine-status">ENGINE STANDBY</span>
    </div>
</div>

<div class="pattern-grid">
    <button class="p-btn" id="btn-GARTLEY" onclick="Engine.toggle('GARTLEY')">GARTLEY</button>
    <button class="p-btn" id="btn-BAT" onclick="Engine.toggle('BAT')">BAT</button>
    <button class="p-btn" id="btn-BUTTERFLY" onclick="Engine.toggle('BUTTERFLY')">BUTTERFLY</button>
    <button class="p-btn" id="btn-CRAB" onclick="Engine.toggle('CRAB')">CRAB</button>
    <button class="p-btn" id="btn-CYPHER" onclick="Engine.toggle('CYPHER')">CYPHER</button>
    <button class="p-btn" id="btn-SHARK" onclick="Engine.toggle('SHARK')">SHARK</button>
</div>

<div id="tv_container"></div>
<div id="radar"><div id="signals-box"></div></div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const Logic = {
    selectedPatterns: new Set(),
    check(pts) {
        if (pts.length < 5) return null;
        const [X, A, B, C, D] = pts.map(p => p.v);
        const xa = Math.abs(A-X), ab = Math.abs(B-A)/xa, bc = Math.abs(C-B)/Math.abs(B-A), ad = Math.abs(D-A)/xa;
        const t = 0.09; // مرونة احترافية 9% 

        if (this.near(ab, 0.618, t) && this.near(ad, 0.786, t)) return "GARTLEY";
        if (this.near(ab, 0.447, 0.15) && this.near(ad, 0.886, t)) return "BAT";
        if (this.near(ab, 0.786, t) && this.near(ad, 1.27, t)) return "BUTTERFLY";
        if (this.near(ab, 0.886, 0.15) && this.near(ad, 1.618, t)) return "CRAB";
        if (bc >= 1.27 && this.near(ad, 0.786, 0.12)) return "CYPHER";
        if (ad >= 0.886 && ad <= 1.13) return "SHARK";
        return null;
    },
    near(v, target, err) { return v >= target - err && v <= target + err; }
};

const Engine = {
    isScanning: false,
    async toggle(pat) {
        const btn = document.getElementById(`btn-${pat}`);
        if (this.selectedPatterns?.has(pat)) {
            Logic.selectedPatterns.delete(pat);
            btn.classList.remove('active');
        } else {
            Logic.selectedPatterns.add(pat);
            btn.classList.add('active');
            if (!this.isScanning) { this.isScanning = true; this.run(); }
        }
        document.getElementById('signals-box').innerHTML = '';
    },
    async run() {
        while (this.isScanning) {
            if (Logic.selectedPatterns.size === 0) { this.isScanning = false; break; }
            document.getElementById('engine-status').innerText = "RADAR ACTIVE";
            try {
                const r = await fetch('https://api.binance.com/api/v3/exchangeInfo').then(res => res.json());
                const pairs = r.symbols.filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING').map(s => s.symbol).slice(0, 300);
                for (let i = 0; i < pairs.length; i += 5) {
                    const batch = pairs.slice(i, i+5);
                    await Promise.all(batch.map(s => this.analyze(s)));
                    await new Promise(res => setTimeout(res, 150));
                }
            } catch (e) {}
            await new Promise(res => setTimeout(res, 8000));
        }
    },
    async analyze(s) {
        for (let tf of ['15m', '1h', '4h']) {
            try {
                const k = await fetch(`https://api.binance.com/api/v3/klines?symbol=${s}&interval=${tf}&limit=80`).then(res => res.json());
                const closes = k.map(c => parseFloat(c[4]));
                const pts = this.getZigZag(closes);
                const result = Logic.check(pts);
                if (result && Logic.selectedPatterns.has(result)) UI.add(s, result, tf, closes[closes.length-1]);
            } catch (e) {}
        }
    },
    getZigZag(d) {
        let pts = [];
        for (let i = 2; i < d.length-2; i++) {
            if ((d[i] > d[i-1] && d[i] > d[i+1]) || (d[i] < d[i-1] && d[i] < d[i+1])) pts.push({v: d[i]});
        }
        return pts.slice(-5);
    }
};

const UI = {
    add(sym, pat, tf, pr) {
        const box = document.getElementById('signals-box');
        const id = `${sym}-${pat}-${tf}`;
        if (document.getElementById(id)) return;
        const el = document.createElement('div');
        el.id = id; el.className = 'sig-card';
        el.innerHTML = `
            <div class="coin-info">
                <b>${sym}</b> <small style="color:var(--army)">[${tf}]</small>
                <span class="tag">${pat} LOCKED</span>
            </div>
            <div class="price-box">
                <div style="font-weight:bold; color:#fff;">$${pr.toFixed(pr < 1 ? 4 : 2)}</div>
                <div style="font-size:0.6rem; color:var(--army); text-align:right;">DETECTED</div>
            </div>`;
        el.onclick = () => this.loadChart(sym, tf);
        box.prepend(el);
    },
    loadChart(s, t) {
        const intervalMap = { '15m': '15', '1h': '60', '4h': '240' };
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:"+s, "interval": intervalMap[t],
            "theme": "dark", "container_id": "tv_container", "locale": "ar", "style": "1"
        });
    }
};
window.onload = () => UI.loadChart('BTCUSDT', '1h');
</script>
</body>
</html>
