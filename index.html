<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAYRO VEX - HARMONIC MOBILE TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050608; --panel: #0f1117; --accent: #00ff66; --text: #f0f0f0; --border: #1e222d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* الهيكلية المنظمة للهواتف */
        header { height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 10; }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 1rem; color: var(--accent); letter-spacing: 1px; }

        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* شريط الشارت المطور */
        #chart-container { flex: 3; background: #000; border-bottom: 2px solid var(--border); }

        /* منطقة الرادار والنتائج (الأسفل) */
        #signals-panel { flex: 2; background: var(--panel); display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .signals-list { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr; gap: 10px; }

        /* كرت الإشارة المخصص للموبايل */
        .signal-card { background: #161a23; border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.3s ease-out; }
        .signal-card:active { transform: scale(0.98); background: #1c222e; }
        
        .card-info { display: flex; flex-direction: column; gap: 4px; }
        .pair-box { display: flex; align-items: center; gap: 8px; }
        .symbol { font-family: 'Orbitron'; font-weight: 700; font-size: 1rem; }
        .timeframe-tag { font-size: 0.65rem; background: var(--accent); color: #000; padding: 1px 4px; border-radius: 3px; font-weight: bold; }
        
        .pattern-details { color: var(--accent); font-size: 0.85rem; font-weight: bold; }
        .ratio-text { color: #888; font-size: 0.7rem; font-family: 'Orbitron'; }

        /* شريط التحميل النيوني */
        .loader-bar { position: absolute; top: 0; left: 0; height: 2px; background: var(--accent); width: 0%; transition: 0.4s; box-shadow: 0 0 10px var(--accent); z-index: 20; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo">NAYRO VEX AI</div>
    <div id="scan-status" style="font-size: 0.6rem; color: #555;">[ SCANNING LIVE ]</div>
</header>

<main>
    <div class="loader-bar" id="p-bar"></div>
    <div id="chart-container"></div>
    
    <div id="signals-panel">
        <div class="panel-header">
            <span style="font-family:'Orbitron'">HARMONIC SCANNER</span>
            <span id="active-count" style="color:var(--accent)">0 SIGNALS</span>
        </div>
        <div class="signals-list" id="list-container">
            <div style="text-align:center; padding:30px; color:#444; font-size:0.8rem;">Searching Binance for Ratios...</div>
        </div>
    </div>
</main>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    const PAIRS = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'XRPUSDT', 'AVAXUSDT', 'NEARUSDT'];
    const TIMEFRAMES = ['15', '60', '240']; // 15m, 1h, 4h

    async function runAdvancedScanner() {
        const container = document.getElementById('list-container');
        const pBar = document.getElementById('p-bar');
        let count = 0;
        pBar.style.width = '30%';

        for (const sym of PAIRS) {
            for (const tf of TIMEFRAMES) {
                try {
                    const interval = tf === '15' ? '15m' : (tf === '60' ? '1h' : '4h');
                    const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${interval}&limit=100`);
                    const data = await res.json();
                    const close = data.map(d => parseFloat(d[4]));

                    // خوارزمية تحديد القمم والقيعان ZigZag
                    const D = close[close.length - 1];
                    const C = Math.max(...close.slice(80, 95));
                    const B = Math.min(...close.slice(65, 80));
                    const A = Math.max(...close.slice(45, 65));
                    const X = Math.min(...close.slice(20, 45));

                    const AB_XA = Math.abs(A-B) / Math.abs(X-A);
                    const AD_XA = Math.abs(A-D) / Math.abs(X-A);

                    let pattern = null;
                    if (AB_XA >= 0.60 && AB_XA <= 0.65) pattern = "GARTLEY";
                    else if (AB_XA >= 0.38 && AB_XA <= 0.52) pattern = "BAT";
                    else if (AB_XA >= 0.77 && AB_XA <= 0.82) pattern = "BUTTERFLY";
                    else if (AD_XA >= 1.13 && AD_XA <= 1.27) pattern = "SHARK";

                    if (pattern) {
                        if (count === 0) container.innerHTML = '';
                        count++;
                        const tfLabel = tf === '15' ? '15M' : (tf === '60' ? '1H' : '4H');
                        
                        const card = document.createElement('div');
                        card.className = 'signal-card';
                        card.onclick = () => loadTradingView(sym, tf);
                        card.innerHTML = `
                            <div class="card-info">
                                <div class="pair-box">
                                    <span class="symbol">${sym}</span>
                                    <span class="timeframe-tag">${tfLabel}</span>
                                </div>
                                <div class="ratio-text">Ratio B/XA: ${AB_XA.toFixed(3)}</div>
                            </div>
                            <div style="text-align:left;">
                                <div class="pattern-details">${pattern}</div>
                                <div style="font-size:0.8rem; color:#fff;">$${D.toFixed(2)}</div>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                } catch (e) {}
            }
        }
        document.getElementById('active-count').innerText = `${count} SIGNALS`;
        pBar.style.width = '100%';
        setTimeout(() => pBar.style.width = '0%', 500);
    }

    function loadTradingView(s, t) {
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:"+s, "interval": t,
            "timezone": "Africa/Algiers", "theme": "dark", "style": "1",
            "locale": "ar", "container_id": "chart-container", "hide_side_toolbar": true,
            "save_image": false, "backgroundColor": "rgba(0, 0, 0, 1)", "gridColor": "rgba(30, 34, 45, 1)"
        });
    }

    window.onload = () => {
        loadTradingView('BTCUSDT', '60');
        runAdvancedScanner();
        setInterval(runAdvancedScanner, 120000); // تحديث كل دقيقتين لتوفير البطارية والبيانات
    };
</script>
</body>
</html>
