<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAYROVEX V18 | LIVE STREAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #000; --panel: #080808; --neon: #00f2ff; --gold: #ffcc00; --sniper: #00ff95; --text: #848e9c; }
        body { margin:0; font-family:'Tajawal',sans-serif; background:var(--bg); color:white; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        .live-bar { height:40px; background:#111; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 20px; font-family:'Orbitron'; font-size:11px; justify-content:space-between; }
        .grid { display:grid; grid-template-columns:260px 1fr 260px; flex:1; overflow:hidden; }
        .side { background:var(--panel); border:1px solid #1a1a1a; padding:10px; overflow-y:auto; }
        #chart { flex:1; background:#000; }
        .stream-card { background:#111; border-left:3px solid var(--sniper); padding:10px; margin-bottom:8px; border-radius:4px; font-size:11px; animation:slide 0.3s ease; }
        @keyframes slide { from{opacity:0; transform:translateX(-10px);} to{opacity:1; transform:0;} }
    </style>
</head>
<body>

<div class="live-bar">
    <div style="display:flex; align-items:center; gap:10px;">
        <div id="ws-status" style="width:10px; height:10px; background:red; border-radius:50%;"></div>
        STREAMING: <span id="stream-count">0</span> PAIRS
    </div>
    <div style="color:var(--neon); font-weight:900; letter-spacing:2px;">NAYROVEX V18 PRO</div>
    <div id="last-update" style="color:var(--text);">WAITING FOR TICK...</div>
</div>

<div class="grid">
    <div class="side" id="market-watch">
        <h6 style="margin:0 0 10px 0; color:var(--text); font-size:9px;">LIVE MARKET TICKER</h6>
        <div id="ticker-list"></div>
    </div>
    <div id="chart"></div>
    <div class="side">
        <h6 style="margin:0 0 10px 0; color:var(--gold); font-size:9px;">HARMONIC PRZ RADAR</h6>
        <div id="radar-list"></div>
    </div>
</div>

<script>
    let PAIRS = ["btcusdt", "ethusdt", "solusdt", "bnbusdt", "avaxusdt", "dogeusdt"]; // عينة للاختبار
    let chart, candleSeries, socket, marketData = {};

    function init() {
        initChart();
        connectWebSocket();
    }

    function initChart() {
        chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: '#000', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#050505' }, horzLines: { color: '#050505' } },
            timeScale: { borderColor: '#111', timeVisible: true }
        });
        candleSeries = chart.addCandlestickSeries({ upColor: '#00ff95', downColor: '#ff4d4d', borderVisible: false });
    }

    // --- WebSocket Engine ---
    function connectWebSocket() {
        const streams = PAIRS.map(s => `${s}@kline_1h`).join('/');
        socket = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);

        socket.onopen = () => {
            document.getElementById('ws-status').style.background = '#00ff95';
            document.getElementById('stream-count').innerText = PAIRS.length;
        };

        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const k = msg.data.k;
            const symbol = msg.data.s;

            // تحديث البيانات الحية
            updateUI(symbol, k);
            
            // إذا أغلقت الشمعة، نطلق الفحص العميق
            if (k.x) { 
                runDeepScan(symbol); 
            }
        };

        socket.onerror = () => { document.getElementById('ws-status').style.background = 'red'; };
    }

    function updateUI(symbol, k) {
        document.getElementById('last-update').innerText = `LATEST: ${symbol} @ ${parseFloat(k.c).toFixed(2)}`;
        // تحديث الـ Ticker في اللوحة الجانبية
        let ticker = document.getElementById(`t-${symbol}`);
        if(!ticker) {
            ticker = document.createElement('div');
            ticker.id = `t-${symbol}`;
            ticker.className = 'stream-card';
            document.getElementById('ticker-list').prepend(ticker);
        }
        ticker.innerHTML = `<strong>${symbol}</strong>: $${parseFloat(k.c).toFixed(2)} <span style="color:${k.c >= k.o ? '#00ff95':'#ff4d4d'}">${((k.c-k.o)/k.o*100).toFixed(2)}%</span>`;
    }

    // --- المحرك التحليلي (تخطي العشوائية) ---
    async function runDeepScan(symbol) {
        console.log(`[V18 Engine] Scanning ${symbol} for PRZ zones...`);
        // هنا يتم استدعاء الـ Web Worker لتجنب تجميد المتصفح
        // محاكاة سريعة لاكتشاف PRZ
        const przMatch = Math.random() > 0.95; 
        if(przMatch) {
            addRadarSignal(symbol);
        }
    }

    function addRadarSignal(symbol) {
        const list = document.getElementById('radar-list');
        const card = document.createElement('div');
        card.className = 'stream-card';
        card.style.borderLeftColor = 'var(--gold)';
        card.innerHTML = `<strong>${symbol}</strong><br>PRZ ZONE DETECTED<br><small>TIME: ${new Array(1).fill(new Date().toLocaleTimeString())}</small>`;
        list.prepend(card);
        // تنبيه صوتي للسيادة
        new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
    }

    window.onload = init;
</script>
</body>
</html>
