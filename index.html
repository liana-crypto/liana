<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIANA PRO | HARMONIC INTELLIGENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: var(--neon); font-family: 'Tajawal', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .app-container { display: flex; flex: 1; overflow: hidden; }
        .chart-area { flex: 1; position: relative; background: #000; border-bottom: 1px solid #222; }
        .side-scanner { width: 320px; border-right: 1px solid #333; display: flex; flex-direction: column; background: #0a0a0a; }
        .scanner-header { padding: 15px; border-bottom: 1px solid #333; text-align: center; background: #000; }
        .signals-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .signal-item { background: var(--card); border: 1px solid #222; border-radius: 8px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; position: relative; animation: fadeIn 0.5s; }
        .signal-item:hover { border-color: var(--neon); transform: scale(1.02); }
        .verified-badge { position: absolute; top: 10px; left: 10px; background: var(--neon); color: #000; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        
        .pair-name { font-family: 'Orbitron'; font-size: 1.2rem; color: #fff; display: block; margin-bottom: 5px; }
        .ratio-info { font-size: 0.8rem; color: #888; margin-top: 5px; }
        .loading-bar { height: 3px; background: var(--neon); width: 0%; position: absolute; top: 0; z-index: 99; transition: 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .app-container { flex-direction: column; } .side-scanner { width: 100%; height: 45%; border-right: none; border-top: 1px solid #333; } }
    </style>
</head>
<body>

<div class="loading-bar" id="loader"></div>

<div class="app-container">
    <div class="chart-area">
        <div id="tv_widget"></div>
    </div>

    <div class="side-scanner">
        <div class="scanner-header">
            <div style="font-family:'Orbitron'; font-size: 1rem; color:#fff;">ANALYSIS ENGINE V8</div>
            <div id="status" style="font-size: 0.7rem; color: var(--neon);">Scanning Live Binance Data...</div>
        </div>
        <div class="signals-list" id="signals-container">
            </div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    const CONFIG = {
        pairs: ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'XRPUSDT', 'LINKUSDT'],
        interval: '1h'
    };

    // صوت تنبيه احترافي عند اكتشاف نموذج
    const alertSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

    async function runAnalysis() {
        const loader = document.getElementById('loader');
        const container = document.getElementById('signals-container');
        loader.style.width = '30%';
        
        let foundAny = false;

        for (const symbol of CONFIG.pairs) {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${CONFIG.interval}&limit=60`);
                const candles = await response.json();
                const prices = candles.map(c => parseFloat(c[4])); // أسعار الإغلاق

                // منطق حساب النقاط X-A-B-C-D مبني على القمم والقيعان الأخيرة
                const D = prices[59];
                const C = Math.max(...prices.slice(45, 55));
                const B = Math.min(...prices.slice(30, 45));
                const A = Math.max(...prices.slice(15, 30));
                const X = Math.min(...prices.slice(0, 15));

                // حساب النسب (فيبوناتشي)
                const AB_XA = Math.abs(A - B) / Math.abs(X - A);
                const BC_AB = Math.abs(B - C) / Math.abs(A - B);
                const CD_BC = Math.abs(C - D) / Math.abs(B - C);

                let pattern = null;
                // شرط Gartley (B تقريباً 0.618 من XA)
                if (AB_XA >= 0.58 && AB_XA <= 0.65) pattern = "GARTLEY";
                // شرط Bat (B تقريباً 0.382 أو 0.50 من XA)
                else if (AB_XA >= 0.35 && AB_XA <= 0.52) pattern = "BAT";

                if (pattern) {
                    if (!foundAny) { container.innerHTML = ''; foundAny = true; alertSound.play(); }
                    
                    const card = document.createElement('div');
                    card.className = 'signal-item';
                    card.innerHTML = `
                        <span class="verified-badge">REAL-TIME</span>
                        <span class="pair-name">${symbol}</span>
                        <div style="color:var(--neon); font-weight:bold;">${pattern} DETECTED</div>
                        <div class="ratio-info">Fib Ratio B/XA: ${AB_XA.toFixed(3)}</div>
                        <div class="ratio-info">Current Price: ${D.toFixed(2)}</div>
                    `;
                    card.onclick = () => loadChart(symbol);
                    container.appendChild(card);
                }
            } catch (e) { console.log("Error logic:", e); }
        }

        if (!foundAny) {
            container.innerHTML = '<div style="text-align:center; color:#555; margin-top:20px;">No Verified Patterns Found Yet...</div>';
        }
        
        loader.style.width = '100%';
        setTimeout(() => loader.style.width = '0%', 500);
    }

    function loadChart(sym) {
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:"+sym, "interval": "60",
            "timezone": "Africa/Algiers", "theme": "dark", "style": "1",
            "locale": "ar", "container_id": "tv_widget", "hide_side_toolbar": false
        });
    }

    window.onload = () => {
        runAnalysis();
        loadChart("BTCUSDT");
        setInterval(runAnalysis, 60000); // تحديث كل دقيقة
    };
</script>
</body>
</html>
