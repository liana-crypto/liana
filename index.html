<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>LIANA AI | رادار الهارمونيك المتكامل</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #000; --panel: #0d0d0d; --text: #d1d4dc; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'Tajawal', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 300px; background: #050505; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 15px; }
        .radar-box { flex: 1; overflow-y: auto; margin-top: 10px; }
        
        .main-stage { flex: 1; display: flex; flex-direction: column; }
        #chart_container { flex: 1; }

        .sig-card { 
            background: var(--panel); border: 1px solid #222; padding: 12px; margin-bottom: 8px; 
            border-radius: 6px; cursor: pointer; transition: 0.2s; border-right: 4px solid var(--neon);
        }
        .sig-card:hover { transform: translateX(-5px); background: #111; }
        .sig-card .info { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.9rem; }
        .probability { color: var(--neon); font-size: 0.7rem; }

        .status-bar { height: 40px; background: #050505; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; padding: 0 20px; font-size: 0.75rem; justify-content: space-between; }
        .loader { width: 10px; height: 10px; background: var(--neon); border-radius: 50%; display: inline-block; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="font-family:'Orbitron'; font-weight:900; color:var(--neon); font-size:1.4rem; margin-bottom:20px;">LIANA AI V5</div>
    <div style="font-size:0.7rem; color:#666;">🔴 LIVE SCANNER (300+ PAIRS)</div>
    <div class="radar-box" id="radar-list"></div>
</div>

<div class="main-stage">
    <div class="status-bar">
        <div><span class="loader"></span> نظام البحث: <b id="current-scan">Initializing...</b></div>
        <div id="pair-stats">Pairs: 0</div>
    </div>
    <div id="chart_container"></div>
</div>

<script>
const LianaV5 = {
    chart: null, candleSeries: null, patternLines: [], markers: [],
    allPairs: [],

    async init() {
        const chartOptions = { 
            layout: { backgroundColor: '#000000', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
            timeScale: { borderColor: '#222', timeVisible: true }
        };
        this.chart = LightweightCharts.createChart(document.getElementById('chart_container'), chartOptions);
        this.candleSeries = this.chart.addCandlestickSeries({ upColor: '#00ff41', downColor: '#ff3131' });

        const info = await fetch('https://api.binance.com/api/v3/exchangeInfo').then(r => r.json());
        this.allPairs = info.symbols.filter(s => s.quoteAsset === 'USDT').map(s => s.symbol);
        document.getElementById('pair-stats').innerText = `Pairs: ${this.allPairs.length}`;

        this.startScanner();
        this.loadChart('BTCUSDT');
    },

    async loadChart(s) {
        const k = await fetch(`https://api.binance.com/api/v3/klines?symbol=${s}&interval=1h&limit=150`).then(r => r.json());
        const data = k.map(d => ({ time: d[0]/1000, open: +d[1], high: +d[2], low: +d[3], close: +d[4] }));
        this.candleSeries.setData(data);
        this.chart.timeScale().fitContent();
        this.clearPatterns(); // تنظيف الشارت عند تغيير العملة
    },

    clearPatterns() {
        this.patternLines.forEach(l => this.chart.removeSeries(l));
        this.patternLines = [];
        this.candleSeries.setMarkers([]);
    },

    async startScanner() {
        const batchSize = 20;
        for (let i = 0; i < this.allPairs.length; i += batchSize) {
            const batch = this.allPairs.slice(i, i + batchSize);
            for (let s of batch) {
                document.getElementById('current-scan').innerText = `Scanning ${s}...`;
                await this.analyze(s);
            }
            await new Promise(r => setTimeout(r, 2000)); // استراحة لتجنب حظر الـ API
        }
        this.startScanner();
    },

    async analyze(s) {
        try {
            const k = await fetch(`https://api.binance.com/api/v3/klines?symbol=${s}&interval=1h&limit=80`).then(r => r.json());
            const c = k.map(d => +d[4]);
            
            // منطق ZigZag مبسط لاكتشاف النقاط بدقة
            let pivots = [];
            for(let i=5; i<c.length-5; i++) {
                const isMax = c.slice(i-5, i+5).every(v => v <= c[i]);
                const isMin = c.slice(i-5, i+5).every(v => v >= c[i]);
                if(isMax || isMin) pivots.push({v: c[i], t: k[i][0]/1000});
            }

            if(pivots.length < 5) return;
            const pts = pivots.slice(-5);
            const [X, A, B, C, D] = pts.map(p => p.v);
            
            // حساب النسب بدقة (Fibonacci Logic)
            const xa = Math.abs(A-X), ab = Math.abs(B-A)/xa, ad = Math.abs(D-A)/xa;
            let model = "";

            if (this.is(ab, 0.618, 0.05)) model = "GARTLEY";
            else if (this.is(ab, 0.382, 0.05)) model = "BAT";
            else if (this.is(ab, 0.786, 0.05)) model = "BUTTERFLY";
            else if (this.is(ad, 1.13, 0.1)) model = "SHARK";

            if (model && D < C) this.updateRadar(s, model, pts, ad);
        } catch(e){}
    },

    is(v, t, e) { return v >= t - e && v <= t + e; },

    updateRadar(s, type, pts, ad) {
        if(document.getElementById('c-'+s)) return;
        const prob = Math.min(100, Math.floor(100 - (Math.abs(ad - 1.13)*100)));
        
        const card = document.createElement('div');
        card.id = 'c-'+s; card.className = 'sig-card';
        card.innerHTML = `<div class="info"><b>${s}</b> <span class="probability">${prob}% ACC</span></div>
                          <div style="font-size:0.7rem; margin-top:5px; color:#aaa;">${type} BULLISH DETECTED</div>`;
        card.onclick = () => {
            this.loadChart(s);
            setTimeout(() => this.drawXABCD(pts), 500);
        };
        document.getElementById('radar-list').prepend(card);
    },

    drawXABCD(pts) {
        this.clearPatterns();
        const labels = ['X', 'A', 'B', 'C', 'D'];
        
        for(let i=1; i<pts.length; i++) {
            const line = this.chart.addLineSeries({ color: 'rgba(0, 255, 65, 0.6)', lineWidth: 2, lineStyle: 0 });
            line.setData([{time: pts[i-1].t, value: pts[i-1].v}, {time: pts[i].t, value: pts[i].v}]);
            this.patternLines.push(line);
        }

        this.candleSeries.setMarkers(pts.map((p, i) => ({
            time: p.t, position: 'aboveBar', color: '#fff', shape: 'arrowDown', text: labels[i]
        })));
    }
};

window.onload = () => LianaV5.init();
</script>
</body>
</html>
