<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LIANA V11.5 | NAYRO VEX</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
<style>
:root { 
    --bg:#000; --panel:#0d0d0d; --neon:#00ff41;
    --GARTLEY:#00ff41; --BAT:#00d4ff; --BUTTERFLY:#bf00ff; --CRAB:#ffd700;
}
body { margin:0; font-family:'Tajawal', sans-serif; height:100vh; display:flex; flex-direction:column; background:var(--bg); color:#fff; overflow:hidden; }

/* قسم الرادار */
.radar-section { 
    height: 35vh; position: relative; overflow: hidden;
    background: radial-gradient(circle, #051505 0%, #000 85%);
    border-bottom: 2px solid #111; display:flex; justify-content:center; align-items:center;
}
#radarCanvas { position: absolute; z-index: 1; width: 100%; height: 100%; }

/* قسم الشارت - جعلته ظاهراً لتجنب مشاكل البياض */
#chart_container { 
    height: 35vh; width: 100%; background: #000; 
    border-bottom: 1px solid #1a1a1a; position: relative;
}

.search-box { padding:10px; background:#050505; border-bottom:1px solid #111; }
#search-input { 
    width:100%; background:#0a0a0a; border:1px solid rgba(0,255,65,0.3); 
    padding:10px; border-radius:8px; color:var(--neon); font-family:'Orbitron'; outline:none;
}

.radar-list { flex:1; overflow-y:auto; padding:10px; background:#000; }
.sig-card { 
    background:#0d0d0d; border:1px solid #1a1a1a; padding:12px; margin-bottom:8px; 
    border-right:4px solid var(--neon); display:flex; justify-content:space-between; 
    align-items:center; cursor:pointer; animation: slideIn 0.3s ease;
}
@keyframes slideIn { from{opacity:0; transform:translateX(10px);} to{opacity:1; transform:translateX(0);} }
.target-flash { animation: flash 1s infinite alternate; }
@keyframes flash { from { box-shadow: 0 0 2px var(--neon); } to { box-shadow: 0 0 10px var(--neon); } }
</style>
</head>
<body>

<div class="radar-section">
    <div style="position:absolute; top:10px; left:15px; font-family:Orbitron; font-size:0.6rem; color:var(--neon); z-index:5;">SYSTEM: ACTIVE_V11.5</div>
    <canvas id="radarCanvas"></canvas>
</div>

<div id="chart_container"></div>

<div class="search-box">
    <input type="text" id="search-input" placeholder="SEARCH_TARGET_LOCATOR..." oninput="Sniper.searchRadar(this.value)">
</div>

<div class="radar-list" id="radar-list"></div>

<script>
const Sniper = {
    chart:null, candleSeries:null, activeSeries:[], signals:new Map(),
    ctx:null, radarAngle:0, points:[], currentTF:'1h',
    sounds: {
        GARTLEY: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
        BAT: new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3'),
        SCAN: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3')
    },

    init() {
        const canvas = document.getElementById('radarCanvas');
        this.ctx = canvas.getContext('2d');
        
        this.resize();
        window.addEventListener('resize', () => this.resize());

        // تهيئة الشارت
        const container = document.getElementById('chart_container');
        this.chart = LightweightCharts.createChart(container, {
            layout: { backgroundColor: '#000', textColor: '#d1d4dc' },
            grid: { vertLines: { visible: false }, horzLines: { color: '#080808' } },
            width: container.clientWidth, height: container.clientHeight,
            timeScale: { borderColor: '#111', timeVisible: true }
        });
        this.candleSeries = this.chart.addCandlestickSeries({ upColor: '#00ff41', downColor: '#ff3131', borderVisible: false });

        this.animateRadar();
        this.loadInitialData();
    },

    resize() {
        const canvas = document.getElementById('radarCanvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.35;
        if(this.chart) {
            const container = document.getElementById('chart_container');
            this.chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
        }
    },

    animateRadar() {
        const { ctx, points } = this;
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const radius = Math.min(cx, cy) - 20;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // دوائر الشبكة
        ctx.strokeStyle = 'rgba(0, 255, 65, 0.1)';
        for(let r=1; r<=3; r++) {
            ctx.beginPath(); ctx.arc(cx, cy, (radius/3)*r, 0, Math.PI*2); ctx.stroke();
        }

        // شعاع المسح
        ctx.save();
        ctx.translate(cx, cy); ctx.rotate(this.radarAngle);
        let grad = ctx.createLinearGradient(0, 0, radius, 0);
        grad.addColorStop(0, 'transparent'); grad.addColorStop(1, 'rgba(0, 255, 65, 0.3)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0, radius, -0.4, 0); ctx.fill();
        ctx.restore();

        // رسم النقاط
        this.points.forEach(p => {
            if(p.highlight) {
                ctx.lineWidth = 2; ctx.strokeStyle = p.color;
                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(p.x, p.y); ctx.stroke();
                ctx.beginPath(); ctx.arc(p.x, p.y, 10 + Math.sin(Date.now()/100)*3, 0, Math.PI*2); ctx.stroke();
            }
            ctx.fillStyle = p.highlight ? '#fff' : p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.highlight ? 6 : 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "8px Orbitron";
            ctx.fillText(p.symbol, p.x + 8, p.y - 8);
        });

        this.radarAngle += 0.03;
        requestAnimationFrame(() => this.animateRadar());
    },

    addSignal(s, m, pts) {
        if(this.signals.has(s)) return;
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const r = (Math.min(cx, cy) - 50) * Math.random() + 20;
        const a = Math.random() * Math.PI * 2;
        const colors = { GARTLEY: '#00ff41', BAT: '#00d4ff', BUTTERFLY: '#bf00ff' };
        
        const p = { symbol: s, x: cx + r * Math.cos(a), y: cy + r * Math.sin(a), color: colors[m] || '#fff', highlight: false, pts, model: m };
        this.points.push(p);
        this.signals.set(s, p);

        if(this.sounds[m]) this.sounds[m].play().catch(()=>{});

        const card = document.createElement('div');
        card.className = 'sig-card target-flash'; card.style.borderRightColor = colors[m];
        card.innerHTML = `<div><b>${s}</b><br><small style="color:${colors[m]}">${m}</small></div><div style="color:var(--neon); font-size:0.5rem;">LOCKED</div>`;
        card.onclick = () => this.showTarget(s);
        document.getElementById('radar-list').prepend(card);

        this.showTarget(s); // استهداف تلقائي
    },

    showTarget(s) {
        const data = this.signals.get(s);
        if(!data) return;
        this.searchRadar(s);
        this.loadPair(s, data.pts, data.model);
    },

    loadPair(s, pts, m) {
        fetch(`https://api.binance.com/api/v3/klines?symbol=${s}&interval=${this.currentTF}&limit=100`)
        .then(r => r.json()).then(k => {
            this.candleSeries.setData(k.map(d => ({ 
                time: d[0]/1000, open: +d[1], high: +d[2], low: +d[3], close: +d[4] 
            })));
            this.drawPattern(pts, m);
            this.chart.timeScale().fitContent();
        });
    },

    drawPattern(pts, m) {
        const colors = { GARTLEY: '#00ff41', BAT: '#00d4ff', BUTTERFLY: '#bf00ff' };
        this.activeSeries.forEach(s => this.chart.removeSeries(s));
        this.activeSeries = [];
        const line = this.chart.addLineSeries({ color: colors[m], lineWidth: 2 });
        line.setData(pts.map(p => ({ time: p.t, value: p.v })));
        this.activeSeries.push(line);

        this.candleSeries.setMarkers(pts.map((p, i) => ({
            time: p.t, position: 'aboveBar', color: colors[m], shape: 'arrowDown', text: ['X','A','B','C','D'][i]
        })));
    },

    searchRadar(val) {
        const q = val.toUpperCase();
        this.points.forEach(p => p.highlight = q !== "" && p.symbol.includes(q));
    },

    async analyze(s) {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${s}&interval=${this.currentTF}&limit=80`);
            const data = await res.json();
            const close = data.map(d => +d[4]);
            let pivots = [];
            for(let i=3; i<close.length-3; i++) {
                const slice = close.slice(i-3, i+3);
                if(slice.every(v => v <= close[i]) || slice.every(v => v >= close[i]))
                    pivots.push({v: close[i], t: data[i][0]/1000});
            }
            if(pivots.length < 5) return;
            const pts = pivots.slice(-5);
            const [X, A, B, C, D] = pts.map(p => p.v);
            const xa = Math.abs(A-X), ab = Math.abs(B-A)/xa;
            
            let m = "";
            if(ab >= 0.61 && ab <= 0.63) m = "GARTLEY";
            else if(ab >= 0.38 && ab <= 0.51) m = "BAT";
            
            if(m) this.addSignal(s, m, pts);
        } catch(e){}
    },

    async loadInitialData() {
        const info = await fetch('https://api.binance.com/api/v3/exchangeInfo').then(r=>r.json());
        this.pairs = info.symbols.filter(s=>s.quoteAsset==='USDT').map(s=>s.symbol);
        this.startScanner();
    },

    startScanner() {
        let idx = 0;
        const scan = async () => {
            const batch = this.pairs.slice(idx, idx + 5);
            await Promise.allSettled(batch.map(s => this.analyze(s)));
            idx = (idx + 5) % this.pairs.length;
            setTimeout(scan, 2000);
        };
        scan();
    }
};

window.onload = () => Sniper.init();
</script>
</body>
</html>
