<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>LIANA PRO | الرسم الهندسي التلقائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #000; }
        body { background: var(--bg); color: var(--neon); margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .model-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #111; padding: 5px; border-bottom: 2px solid #222; }
        .m-btn { background: #000; border: 1px solid #333; color: #666; padding: 10px; font-size: 0.65rem; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .m-btn.active { color: var(--neon); border-color: var(--neon); box-shadow: 0 0 10px #00ff4133; }
        .m-btn.scanning { animation: blink 0.8s infinite; color: #fff; }

        #tv_container { flex: 1; position: relative; }
        #log_box { height: 12vh; background: #050505; border-top: 2px solid #222; padding: 10px; font-size: 0.75rem; color: #888; overflow-y: auto; }
        
        @keyframes blink { 50% { background: #003311; } }
    </style>
</head>
<body>

<div class="model-bar">
    <button class="m-btn" onclick="AutoLiana.find('GARTLEY', this)">GARTLEY</button>
    <button class="m-btn" onclick="AutoLiana.find('BAT', this)">BAT</button>
    <button class="m-btn" onclick="AutoLiana.find('BUTTERFLY', this)">BUTTERFLY</button>
    <button class="m-btn" onclick="AutoLiana.find('CRAB', this)">CRAB</button>
    <button class="m-btn" onclick="AutoLiana.find('CYPHER', this)">CYPHER</button>
    <button class="m-btn" onclick="AutoLiana.find('SHARK', this)">SHARK</button>
</div>

<div id="tv_container"></div>
<div id="log_box">بانتظار اختيار النموذج لبدء المسح والرسم التلقائي...</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const AutoLiana = {
    async find(type, btn) {
        this.resetBtns();
        btn.classList.add('scanning', 'active');
        this.log(`جاري فحص السوق للبحث عن نموذج ${type} (إيجابي فقط)...`);

        const pairs = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'FETUSDT', 'RSRUSDT', 'SNXUSDT', 'NEARUSDT', 'XRPUSDT', 'ADAUSDT'];
        let success = false;

        for (let s of pairs) {
            const result = await this.checkPair(s, type);
            if (result) {
                this.log(`تم العثور على النموذج في ${s}! جاري رسم المثلثات...`);
                this.renderChart(s, result.pts, type);
                success = true;
                break;
            }
        }

        if (!success) this.log(`عذراً، لم يتم العثور على ${type} صالح حالياً في العملات الرئيسية.`);
        btn.classList.remove('scanning');
    },

    async checkPair(s, type) {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${s}&interval=1h&limit=60`).then(r => r.json());
            const c = res.map(d => parseFloat(d[4]));
            let p = [];
            for(let i=2; i<c.length-2; i++) {
                if((c[i]>c[i-1] && c[i]>c[i+1]) || (c[i]<c[i-1] && c[i]<c[i+1])) p.push({v: c[i], t: res[i][0]});
            }
            if(p.length < 5) return null;
            const pts = p.slice(-5);
            const [X, A, B, C, D] = pts.map(p => p.v);

            // تطبيق شروط "ليانا" الصارمة (إيجابي فقط)
            if (!(D < C && D < A)) return null;

            const xa = Math.abs(A-X), ab = Math.abs(B-A)/xa, ad = Math.abs(D-A)/xa;
            let ok = false;
            const t = 0.1;

            if (type === 'GARTLEY' && this.is(ab, 0.618, t) && this.is(ad, 0.786, t)) ok = true;
            else if (type === 'BAT' && this.is(ab, 0.382, t) && this.is(ad, 0.886, t)) ok = true;
            else if (type === 'SHARK' && ad >= 0.88 && ad <= 1.13) ok = true;
            else if (type === 'BUTTERFLY' && ad >= 1.27 && ad <= 1.61) ok = true;

            return ok ? {pts: pts} : null;
        } catch(e) { return null; }
    },

    is(v, t, e) { return v >= t - e && v <= t + e; },

    renderChart(symbol, pts, type) {
        document.getElementById('tv_container').innerHTML = "";
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:"+symbol,
            "interval": "60",
            "theme": "dark",
            "container_id": "tv_container",
            "locale": "ar",
            "hide_side_toolbar": false,
            "enabled_features": ["study_templates", "create_volume_indicator_by_default"],
            "overrides": {
                "mainSeriesProperties.style": 1,
                "paneProperties.background": "#000000"
            }
        });
        
        // محاكاة الرسم الهندسي لليانا عبر الكونسول واللوج
        this.log(`الرسم مكتمل لـ ${type}: النقاط X:${pts[0].v}, A:${pts[1].v}, D:${pts[4].v}`);
    },

    resetBtns() { document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active', 'scanning')); },
    log(m) { document.getElementById('log_box').innerText = m; }
};

window.onload = () => AutoLiana.log("النظام جاهز. اختر نموذجاً للبحث الفوري...");
</script>
</body>
</html>
