<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>NAYROVEX V32 | Selective Sniper</title>
    <style>
        :root { --bg: #050608; --card: #111418; --accent: #ffcc00; --green: #00ff88; --dim: #848e9c; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* تصميم الأزرار كما في الصورة */
        .nav-header { display: flex; gap: 12px; padding: 15px; background: var(--card); border-bottom: 1px solid #1e2329; overflow-x: auto; scrollbar-width: none; }
        .model-btn { 
            background: #1e2329; border: 1px solid #2b3139; padding: 12px 22px; border-radius: 12px; 
            color: var(--dim); cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; min-width: 150px;
        }
        .model-btn b { color: var(--accent); background: rgba(255, 204, 0, 0.1); padding: 2px 8px; border-radius: 6px; font-size: 13px; }
        .model-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        .model-btn.active b { color: #000; background: rgba(0,0,0,0.2); }

        /* منطقة الرصد */
        .radar-section { display: flex; flex-direction: column; background: #0b0e11; border-bottom: 1px solid #1e2329; }
        .radar-status { padding: 8px 15px; font-size: 11px; color: var(--accent); border-bottom: 1px solid #161a1e; display: flex; justify-content: space-between; }
        .results-grid { display: flex; gap: 15px; padding: 15px; overflow-x: auto; min-height: 110px; align-items: center; }
        
        .card { 
            background: var(--card); padding: 15px; border-radius: 14px; border-left: 4px solid var(--accent); 
            min-width: 180px; cursor: pointer; transition: 0.3s; animation: popIn 0.4s ease; position: relative;
        }
        .card:hover { transform: translateY(-4px); background: #1c2127; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .card .pair { font-size: 16px; font-weight: bold; }
        .card .price { color: var(--green); font-family: monospace; font-size: 14px; margin-top: 5px; display: block; }
        
        .main-view { flex: 1; background: #000; position: relative; }

        @keyframes popIn { from { opacity: 0; scale: 0.9; } to { opacity: 1; scale: 1; } }
    </style>
</head>
<body>

<div class="nav-header">
    <button class="model-btn active" id="btn-ALL" onclick="setMode('ALL', this)">الكل 🌐 <b id="count-ALL">0</b></button>
    <button class="model-btn" id="btn-Cypher" onclick="setMode('Cypher', this)">Cypher 🛡️ <b id="count-Cypher">0</b></button>
    <button class="model-btn" id="btn-Shark" onclick="setMode('Shark', this)">Shark 🦈 <b id="count-Shark">0</b></button>
    <button class="model-btn" id="btn-Bat" onclick="setMode('Bat', this)">Bat 🦇 <b id="count-Bat">0</b></button>
    <button class="model-btn" id="btn-Crab" onclick="setMode('Crab', this)">Crab 🦀 <b id="count-Crab">0</b></button>
    <button class="model-btn" id="btn-Gartley" onclick="setMode('Gartley', this)">Gartley <b id="count-Gartley">0</b></button>
</div>

<div class="radar-section">
    <div class="radar-status">
        <span id="mode-text">📡 الرادار: وضعية المسح الشامل</span>
        <span id="live-stat">جاري تحليل 0 زوج...</span>
    </div>
    <div class="results-grid" id="resultsGrid">
        <div style="color: #333; font-size: 13px;">بانتظار رصد إشارات الهارمونيك... 📡</div>
    </div>
</div>

<div class="main-view" id="tv_chart_container"></div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let memory = {}, activeMode = 'ALL', tv = null;
    const COLORS = { Bat: "#ffcc00", Cypher: "#ff6600", Shark: "#00c2ff", Gartley: "#00ff88", Crab: "#ff33cc" };

    // 1. محرك الهارمونيك (Harmonic Engine)
    function detectHarmonic(p) {
        const X=p[0].p, A=p[1].p, B=p[2].p, C=p[3].p, D=p[4].p;
        const rAB = Math.abs(B-A)/Math.abs(A-X), rXD = Math.abs(D-X)/Math.abs(A-X);

        if(isNear(rAB, 0.44, 0.05) && isNear(rXD, 0.886, 0.04)) return "Bat";
        if(isNear(rAB, 0.5, 0.08) && C > Math.max(A,X) && isNear(rXD, 0.786, 0.05)) return "Cypher";
        if(isNear(rAB, 0.886, 0.07)) return "Shark";
        if(isNear(rAB, 0.618, 0.05) && isNear(rXD, 0.786, 0.05)) return "Gartley";
        if(isNear(rAB, 0.382, 0.05) && isNear(rXD, 1.27, 0.08)) return "Crab";
        return null;
    }
    function isNear(v, t, tol) { return Math.abs(v - t) <= tol; }

    // 2. معالجة البيانات (Live Feed)
    function initRadar() {
        const ws = new WebSocket("wss://stream.binance.com:9443/ws/!ticker@arr");
        ws.onmessage = e => {
            const data = JSON.parse(e.data);
            document.getElementById('live-stat').innerText = `تحليل ${data.length} زوج حالياً...`;
            data.forEach(i => {
                if(i.s.endsWith("USDT") && parseFloat(i.q) > 2000000) {
                    processLive(i.s, parseFloat(i.c));
                }
            });
        };
    }

    function processLive(s, p) {
        if(!memory[s]) memory[s] = {pivots:[], patterns:[], currentPrice: 0};
        let m = memory[s];
        m.currentPrice = p;

        if(m.pivots.length === 0 || Math.abs(p - m.pivots[m.pivots.length-1].p)/m.pivots[m.pivots.length-1].p > 0.012) {
            m.pivots.push({p:p});
            if(m.pivots.length > 5) {
                m.pivots.shift();
                let found = detectHarmonic(m.pivots);
                if(found && !m.patterns.includes(found)) {
                    m.patterns.push(found);
                    updateUI();
                    if(activeMode === 'ALL' || activeMode === found) playSound();
                }
            }
        }
    }

    // 3. التحكم والواجهة (UI Control)
    function setMode(mode, btn) {
        activeMode = mode;
        document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('mode-text').innerText = `📡 الرادار: وضعية رصد [${mode === 'ALL' ? 'الكل' : mode}]`;
        updateUI();
    }

    function updateUI() {
        const grid = document.getElementById("resultsGrid");
        grid.innerHTML = "";
        let counts = {ALL:0, Cypher:0, Shark:0, Bat:0, Crab:0, Gartley:0};

        for(let s in memory) {
            memory[s].patterns.forEach(pat => {
                counts.ALL++;
                counts[pat]++;
                
                // الفلترة الانتقائية: لا تظهر البطاقة إلا إذا كانت تطابق الوضع المختار
                if(activeMode === 'ALL' || activeMode === pat) {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.style.borderLeftColor = COLORS[pat];
                    card.innerHTML = `<span class="pair">${s}</span><br>
                                      <small style="color:${COLORS[pat]}">${pat}</small>
                                      <span class="price">$${memory[s].currentPrice.toLocaleString()}</span>`;
                    card.onclick = () => tv.chart().setSymbol("BINANCE:"+s);
                    grid.prepend(card);
                }
            });
        }
        
        // تحديث أرقام العدادات في الأزرار
        for(let key in counts) {
            const el = document.getElementById(`count-${key}`);
            if(el) el.innerText = counts[key];
        }
        if(grid.innerHTML === "") grid.innerHTML = `<div style="color:#444; font-size:13px;">لا توجد نماذج ${activeMode} حالياً...</div>`;
    }

    function playSound() { new Audio('https://assets.mixkit.co/sfx/preview/mixkit-notification-light-2701.mp3').play().catch(()=>{}); }

    window.onload = () => {
        tv = new TradingView.widget({
            autosize:true, symbol:"BINANCE:BTCUSDT", interval:"60", theme:"dark",
            container_id:"tv_chart_container", style:"1", hide_top_toolbar: true
        });
        initRadar();
    };
</script>
</body>
</html>
