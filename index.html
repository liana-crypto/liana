<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAYROVEX V20 | Elite Sniper</title>
    <style>
        :root { --bg: #0b0e11; --card: #161a1e; --accent: #ffcc00; --text: #fff; --green: #00ff88; --red: #ff3e3e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Model Filter Bar */
        .models-bar { display: flex; gap: 8px; padding: 10px; background: #1e2329; overflow-x: auto; border-bottom: 1px solid #2b2f36; }
        .model-btn { padding: 6px 15px; border: 1px solid #2b2f36; border-radius: 8px; cursor: pointer; background: var(--card); color: #848e9c; white-space: nowrap; font-size: 11px; transition: 0.3s; }
        .model-btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); box-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }

        .top-nav { display: flex; gap: 10px; padding: 10px; background: var(--card); }
        input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #2b2f36; background: #0b0e11; color: white; outline: none; }
        .btn-scan { padding: 8px 15px; border: none; border-radius: 8px; background: var(--accent); cursor: pointer; font-weight: bold; }

        .pins-bar { display: flex; gap: 10px; padding: 10px; overflow-x: auto; min-height: 70px; border-bottom: 1px solid #1e2329; align-items: center; }
        .pin { min-width: 110px; padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; animation: fadeIn 0.4s; transition: 0.2s; }
        .pin:hover { transform: translateY(-3px); border-color: var(--accent); }
        .pin b { font-size: 13px; display: block; margin-bottom: 3px; }
        .pin small { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.3); }

        .display-panel { display: flex; justify-content: space-between; padding: 12px 20px; align-items: center; background: #0b0e11; border-bottom: 1px solid #1e2329; }
        .big-price { font-size: 30px; font-weight: bold; color: var(--green); }
        
        #chart-container { flex: 1; position: relative; background: #000; }
        #loader { position: absolute; top:50%; left:50%; transform:translate(-50%, -50%); display: none; color: var(--accent); z-index: 10; font-weight: bold; }
        
        .empty-msg { color: #444; font-size: 12px; width: 100%; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="models-bar" id="modelsBar">
        <div class="model-btn active" onclick="filterByModel('ALL', this)">الكل 🌐</div>
        <div class="model-btn" onclick="filterByModel('Bat', this)">Bat 🦇</div>
        <div class="model-btn" onclick="filterByModel('Gartley', this)">Gartley 📉</div>
        <div class="model-btn" onclick="filterByModel('Butterfly', this)">Butterfly 🦋</div>
        <div class="model-btn" onclick="filterByModel('Crab', this)">Crab 🦀</div>
        <div class="model-btn" onclick="filterByModel('Shark', this)">Shark 🦈</div>
        <div class="model-btn" onclick="filterByModel('Cypher', this)">Cypher 🛡️</div>
    </div>

    <div class="top-nav">
        <input type="text" id="coinInput" placeholder="بحث يدوي (BTC, SOL, PEPE...)">
        <button class="btn-scan" onclick="handleSearch()">رصد 🎯</button>
    </div>

    <div class="pins-bar" id="pins">
        <div class="empty-msg">بانتظار رصد نماذج Harmonic... 📡</div>
    </div>

    <div class="display-panel">
        <div><b id="currentPair" style="font-size: 18px;">BTCUSDT</b><br><small id="status" style="color: var(--accent);">Global Scanner: Live 🟢</small></div>
        <div class="big-price" id="priceDisplay">0.00</div>
    </div>

    <div id="chart-container">
        <div id="loader">جارِ تحديث البيانات...</div>
        <div id="tv_widget" style="height:100%; width:100%;"></div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let tvWidget = null, globalWS = null, activeFilter = 'ALL';
        let globalMemory = {}; 
        const ZZ_THRESHOLD = 0.02; // 2%

        function initChart(symbol='BTCUSDT') {
            tvWidget = new TradingView.widget({
                "autosize": true, "symbol": "BINANCE:"+symbol, "interval": "60",
                "theme": "dark", "style": "1", "locale": "ar", "container_id": "tv_widget",
                "hide_top_toolbar": true
            });
        }

        function isWithin(val, target, tol=0.06) { return Math.abs(val - target) <= tol; }

        function scanForPatterns(p) {
            const X=p[0].price, A=p[1].price, B=p[2].price, C=p[3].price, D=p[4].price;
            const XA=Math.abs(A-X), AB=Math.abs(B-A), BC=Math.abs(C-B), CD=Math.abs(D-C);
            const rAB=AB/XA, rD=Math.abs(D-X)/XA;

            if(isWithin(rD, 0.886) && (isWithin(rAB, 0.382) || isWithin(rAB, 0.5))) return {name:'Bat', color:'#ffcc00', bg:'rgba(255, 204, 0, 0.15)'};
            if(isWithin(rD, 0.786) && isWithin(rAB, 0.618)) return {name:'Gartley', color:'#00ff88', bg:'rgba(0, 255, 136, 0.15)'};
            if(isWithin(rD, 1.272) && isWithin(rAB, 0.786)) return {name:'Butterfly', color:'#00ccff', bg:'rgba(0, 204, 255, 0.15)'};
            if(isWithin(rD, 1.618) && isWithin(rAB, 0.886)) return {name:'Crab', color:'#ff33cc', bg:'rgba(255, 51, 204, 0.15)'};
            if(C > A && isWithin(rD, 1.13, 0.15)) return {name:'Shark', color:'#ffffff', bg:'rgba(255, 255, 255, 0.15)'};
            if(isWithin(rAB, 0.5, 0.1) && (C > A)) return {name:'Cypher', color:'#ff6600', bg:'rgba(255, 102, 0, 0.15)'};
            return null;
        }

        function startGlobalScanner() {
            if(globalWS) globalWS.close();
            globalWS = new WebSocket('wss://stream.binance.com:9443/ws/!ticker@arr');
            globalWS.onmessage = (e) => {
                const data = JSON.parse(e.data).filter(i => i.s.endsWith('USDT'));
                data.forEach(item => {
                    const s = item.s, p = parseFloat(item.c);
                    if(!globalMemory[s]) globalMemory[s] = { pivots: [], patterns: [] };
                    let m = globalMemory[s];
                    
                    if(m.pivots.length === 0 || Math.abs(p - m.pivots[m.pivots.length-1].price)/m.pivots[m.pivots.length-1].price > ZZ_THRESHOLD) {
                        m.pivots.push({price: p, time: Date.now()});
                        if(m.pivots.length > 5) {
                            m.pivots.shift();
                            const found = scanForPatterns(m.pivots);
                            if(found && !m.patterns.some(x => x.name === found.name)) {
                                m.patterns.push(found);
                                renderPins();
                                playAlert();
                            }
                        }
                    }
                    if(s === document.getElementById('currentPair').innerText) updateUI(item);
                });
            };
        }

        function updateUI(item) {
            const el = document.getElementById('priceDisplay');
            el.innerText = parseFloat(item.c).toLocaleString(undefined, {minimumFractionDigits: 2});
            el.style.color = parseFloat(item.p) >= 0 ? "#00ff88" : "#ff3e3e";
        }

        function renderPins() {
            const container = document.getElementById('pins');
            container.innerHTML = '';
            let hasAny = false;
            for(const s in globalMemory) {
                globalMemory[s].patterns.forEach(pt => {
                    if(activeFilter === 'ALL' || pt.name === activeFilter) {
                        hasAny = true;
                        const div = document.createElement('div');
                        div.className = 'pin';
                        div.style.background = pt.bg;
                        div.style.borderRight = `4px solid ${pt.color}`;
                        div.innerHTML = `<b>${s}</b><small style="color:${pt.color}">${pt.name}</small>`;
                        div.onclick = () => {
                            document.getElementById('currentPair').innerText = s;
                            if(tvWidget) tvWidget.chart().setSymbol('BINANCE:'+s);
                        };
                        container.prepend(div);
                    }
                });
            }
            if(!hasAny) container.innerHTML = `<div class="empty-msg">لا توجد نماذج ${activeFilter === 'ALL' ? '' : activeFilter} متاحة حالياً...</div>`;
        }

        function filterByModel(m, btn) {
            activeFilter = m;
            document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderPins();
        }

        function playAlert() {
            const audio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3');
            audio.play().catch(()=>{}); 
        }

        function handleSearch() {
            const s = document.getElementById('coinInput').value.toUpperCase();
            if(s) {
                const pair = s.includes('USDT') ? s : s+'USDT';
                document.getElementById('currentPair').innerText = pair;
                if(tvWidget) tvWidget.chart().setSymbol('BINANCE:'+pair);
            }
        }

        window.onload = () => { initChart(); startGlobalScanner(); };
    </script>
</body>
</html>
